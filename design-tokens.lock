# 규칙: viewer/index.html :root 의 모든 토큰명은 이 파일에 등재돼야 한다.
#   · 미등재 신규 토큰 = check_refs rc=1 (커밋 차단·pre-commit 강제).
#   · 등재 = 운영자 승인. 새 토큰은 PR 에서 이 파일의 diff 를 운영자가 리뷰·승인한다.
#   · "승인 없이 조용히 :root 에 토큰 추가"를 기계가 봉쇄 = §🔒 절대명령#1 진짜 강제 지렛대.
# 형식: 한 줄에 토큰명 하나(뒤/앞 주석 = 사유). 그룹·순서 무관, 이름만 매칭.

