name: yeta-kimi-selftest

# KIMI-K3 연결 자가진단(운영자 260720 "내가 설정만 하면 되게 조치 다해놔") — ① 레포 Actions 시크릿 KIMI_CODE_MUTE 존재
#   ② 문샷 Anthropic 호환 게이트 실호출 1발(초미니 프롬프트)로 챗 러너(yeta_chat.sh gen_out)와 동일 레시피
#   (ANTHROPIC_BASE_URL·키 주입 · 구독 OAuth unset · --model kimi-k3 · 도구 0) 검증 ③ effort(low) 수용 여부 판정.
# ⚠️ 종량제 실과금(1발 ≈ 수십 토큰) → 수동 dispatch 전용 · 크론 부착 금지(§[8]) · 키 회전/불통 진단 때 재사용.
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: KIMI-K3 실호출(챗 경로 동일 레시피)
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_CODE_MUTE }}
          KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL || '' }}
        run: |
          [ -n "$KIMI_API_KEY" ] || { echo "::error::FAIL① 레포 Actions 시크릿 KIMI_CODE_MUTE 미등재 — Settings → Secrets and variables → Actions 에 정확히 이 이름으로"; exit 1; }
          echo "① 시크릿 KIMI_CODE_MUTE OK(존재)"
          export ANTHROPIC_BASE_URL="${KIMI_BASE_URL:-https://api.moonshot.ai/anthropic}" ANTHROPIC_AUTH_TOKEN="$KIMI_API_KEY" ANTHROPIC_API_KEY="$KIMI_API_KEY"
          unset CLAUDE_CODE_OAUTH_TOKEN
          NOTOOLS="Write,Edit,NotebookEdit,Bash,Task,WebFetch,WebSearch,Read,Glob,Grep"
          call() { printf '%s' "인사 한 단어로만 답해" | timeout 150 claude -p --model kimi-k3 "$@" --disallowedTools "$NOTOOLS" --max-turns 1 2>/tmp/err; }
          set +e
          OUT="$(call --effort low)"; rc=$?; EFFN="수용"
          if { [ $rc -ne 0 ] || [ -z "${OUT// }" ]; } && grep -qiE 'effort|thinking' /tmp/err 2>/dev/null; then
            echo "  ⚠️ effort 거부 감지 — effort 없이 재시도(챗 gen_out 폴백과 동일)"
            OUT="$(call)"; rc=$?; EFFN="거부(챗은 자동 폴백 = 정상 동작)"
          fi
          echo "── stderr 꼬리(시크릿 = GitHub 자동 마스킹) ──"; tail -5 /tmp/err 2>/dev/null || true
          if [ $rc -ne 0 ] || [ -z "${OUT// }" ]; then echo "::error::FAIL② kimi-k3 실호출 실패(rc=$rc) — 위 stderr 참조(잔액·키 유효성·게이트 URL 순 의심)"; exit 1; fi
          echo "② 실호출 OK — 응답: $(printf '%s' "$OUT" | head -c 80)"
          echo "③ effort(low) ${EFFN}"
          echo "PASS — 설정에서 KIMI-K3 고르면 대화 가능(챗 러너 동일 레시피 검증 완료)"
