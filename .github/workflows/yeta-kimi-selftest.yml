name: yeta-kimi-selftest

# KIMI 연결 자가진단 v3(260720 신설 → 260721 확장) — 챗 러너(gen_out) 동일 레시피로 실호출 + usage 실측.
#   ① 시크릿 KIMI_CODE_MUTE 존재 ② 실호출(--tools "" 신레시피 = 책빼기 반영) ③ effort(low) 수용 판정
#   ④ 턴당 입력 실측(신레시피 기준 — 260721 K3 구레시피 실측: 한 단어에 18,678tok = 도구 스키마가 본체)
#   ⑤ 캐시 히트 실측 = 동일 프롬프트 재발사(260721 K3 실측: 히트 7,168tok = 문샷 자동 캐시 /anthropic 게이트 작동 확인)
#   실패 시 = stderr 꼬리 + stdout(JSON 에러 본문) 머리 둘 다 출력(K2.5 260721 1차 실패가 본문 미포집으로 원인불명이던 구멍 봉합).
# ⚠️ 종량제 실과금(2발 · 신레시피면 수천 토큰 이내) → 수동 dispatch 전용 · 크론 부착 금지(§[8]).
on:
  workflow_dispatch:
    inputs:
      model:
        description: '검증 모델(챗 다이얼과 동일 ID)'
        required: false
        default: 'kimi-k3'
        type: choice
        options:
          - kimi-k3
          - kimi-k2.5
permissions:
  contents: read
jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: KIMI 실호출(챗 경로 동일 레시피 + usage 실측)
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_CODE_MUTE }}
          KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL || '' }}
          MODEL: ${{ inputs.model || 'kimi-k3' }}
        run: |
          [ -n "$KIMI_API_KEY" ] || { echo "::error::FAIL① 레포 Actions 시크릿 KIMI_CODE_MUTE 미등재 — Settings → Secrets and variables → Actions 에 정확히 이 이름으로"; exit 1; }
          echo "① 시크릿 KIMI_CODE_MUTE OK(존재) · 대상 모델 = $MODEL"
          export ANTHROPIC_BASE_URL="${KIMI_BASE_URL:-https://api.moonshot.ai/anthropic}" ANTHROPIC_AUTH_TOKEN="$KIMI_API_KEY" ANTHROPIC_API_KEY="$KIMI_API_KEY"
          unset CLAUDE_CODE_OAUTH_TOKEN
          NOTOOLS="Write,Edit,NotebookEdit,Bash,Task,WebFetch,WebSearch,Read,Glob,Grep"
          call() { printf '%s' "인사 한 단어로만 답해" | timeout 150 claude -p --model "$MODEL" --output-format json --system-prompt "너는 테스트 봇이다. 한국어 한 단어로만 답한다." --tools "" --disallowedTools "$NOTOOLS" --max-turns 1 "$@" 2>/tmp/err; }
          usage() { printf '%s' "$1" | jq -r '"입력 \(.usage.input_tokens // 0) tok · 캐시읽기 \(.usage.cache_read_input_tokens // 0) · 캐시쓰기 \(.usage.cache_creation_input_tokens // 0) · 출력 \(.usage.output_tokens // 0)"' 2>/dev/null || echo "usage 파싱 불가"; }
          body() { printf '%s' "$1" | jq -r '.result // empty' 2>/dev/null | head -c 80; }
          ok() { printf '%s' "$1" | jq -e '.result | type=="string"' >/dev/null 2>&1; }
          set +e
          RAWA="$(call --effort low)"; rc=$?; EFFN="수용"
          if { [ $rc -ne 0 ] || ! ok "$RAWA"; } && grep -qiE 'effort|thinking' /tmp/err 2>/dev/null; then
            echo "  ⚠️ effort 거부 감지 — effort 없이 재시도(챗 gen_out 폴백과 동일)"
            RAWA="$(call)"; rc=$?; EFFN="거부(챗은 자동 폴백 = 정상 동작)"
          fi
          if [ $rc -ne 0 ] || ! ok "$RAWA"; then
            echo "── stderr 꼬리(시크릿 = GitHub 자동 마스킹) ──"; tail -5 /tmp/err 2>/dev/null || true
            echo "── stdout(JSON 에러 본문) 머리 ──"; printf '%s' "$RAWA" | head -c 600; echo ""
            echo "::error::FAIL② $MODEL 실호출 실패(rc=$rc) — 위 본문 참조(모델 ID·게이트 미지원·잔액·키 유효성 순 의심)"; exit 1
          fi
          echo "② 실호출 OK — 응답: $(body "$RAWA")"
          echo "③ effort(low) ${EFFN}"
          echo "④A [신레시피 = 책빼기(--tools \"\" + 시스템 교체)] $(usage "$RAWA")"
          RAWB="$(call)"
          if ok "$RAWB"; then
            echo "⑤B [캐시 판정 = 동일 재발사] $(usage "$RAWB")"
            CR="$(printf '%s' "$RAWB" | jq -r '.usage.cache_read_input_tokens // 0' 2>/dev/null || echo 0)"
            if [ "${CR:-0}" -gt 0 ] 2>/dev/null; then echo "⑤ 캐시 = 작동(히트 ${CR} tok — 반복 입력 1/10 과금)"; else echo "⑤ 캐시 = 미히트(반복 입력 전액 과금 추정)"; fi
          fi
          echo "PASS — $MODEL 대화 연결 검증 완료(설정 다이얼에서 선택 가능)"
