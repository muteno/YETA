name: yeta-voice

# yeta 페르소나 전용 음색 생성(보이스 클로닝) — **수동 dispatch 전용**(⚠️ ElevenLabs 유료 · face/bg 동일 원칙 · 260704).
# 운영자 1분 샘플(비공개 R2 voice_samples/<persona>.mp3) → ElevenLabs IVC → roster.json "voice":"el:<id>" 주입 커밋
# = 그 캐릭터 **프리미엄 승격**(전화 yeta-call·무전기 PTT 답장 TTS 가 yeta_tts.py 에서 이 음색 자동 우선).
# ⚠️ 샘플 = 목소리 원본(민감) → 비공개 세션 버킷(YETA_R2_BUCKET)만 · 공개 버킷·git 커밋 금지.
on:
  workflow_dispatch:
    inputs:
      persona:
        description: '캐릭터 id(필수 · 예: haeun) — 샘플 = 비공개 R2 voice_samples/<id>.mp3'
        required: true
      sample_key:
        description: '샘플 R2 키 직접 지정(선택 · 기본 voice_samples/<persona>.mp3)'
        required: false
        default: ''
      force:
        description: '1 = 이미 클론 보이스 있어도 재클론'
        required: false
        default: ''

permissions:
  contents: write   # roster voice 주입 커밋

concurrency:
  group: yeta-voice
  cancel-in-progress: false

jobs:
  clone:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: 샘플 다운로드(비공개 R2) + 클로닝 + roster 주입
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          YETA_R2_BUCKET: ${{ secrets.YETA_R2_BUCKET }}
          YETA_VOICE_PERSONA: ${{ inputs.persona }}
          YETA_VOICE_KEY: ${{ inputs.sample_key }}
          FORCE: ${{ inputs.force }}
        run: |
          [ -n "${ELEVENLABS_API_KEY}" ] || { echo "ELEVENLABS_API_KEY 미설정 — no-op(운영자 시크릿 등록 대기)"; exit 0; }
          [ -n "${YETA_R2_BUCKET}" ] || { echo "::error::YETA_R2_BUCKET 필요(샘플 = 비공개 R2)"; exit 1; }
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" AWS_DEFAULT_REGION=auto
          KEY="${YETA_VOICE_KEY:-voice_samples/${YETA_VOICE_PERSONA}.mp3}"
          aws s3 cp "s3://${YETA_R2_BUCKET}/${KEY}" /tmp/sample.mp3 \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --only-show-errors \
            || { echo "::error::샘플 없음 — 비공개 R2 ${KEY} 에 1분 샘플을 먼저 업로드"; exit 1; }
          YETA_VOICE_SAMPLE=/tmp/sample.mp3 python3 .github/scripts/yeta_voice_clone.py

      - name: roster 커밋 (rebase 재시도 = yeta-face 패턴)
        run: |
          git config user.name "yeta-bot"
          git config user.email "bot@nomute.local"
          git add apps/yeta/characters/roster.json
          git commit -m "yeta: 페르소나 전용 음색(클론 보이스) roster 주입 — 프리미엄 승격" || { echo "커밋할 것 없음"; exit 0; }
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin main && git rebase origin/main && git push origin HEAD:main; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push 5회 실패"; exit 1; }
