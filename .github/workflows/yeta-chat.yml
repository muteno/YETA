name: yeta-chat

# yeta 캐릭터 챗 — 뷰어(functions/api/yeta.js)가 유저 메시지를 R2 세션에 append 후 dispatch.
# 이 잡이 캐릭터로 답장 1턴 생성(claude -p · 구독 OAuth) → R2 세션 append → 완료 웹푸시.
# ⚠️ 대화 데이터는 레포에 커밋하지 않는다(public 레포 = 공개 박제 · 계획안 D2) — 세션 = R2 비공개 버킷 전용.
# 레이턴시 설계(계획안 §2): dispatch 트리거 + fetch-depth:1 + claude CLI 주간 캐시 + R2 직읽기(재빌드 0).
on:
  workflow_dispatch:
    inputs:
      char:
        description: '캐릭터 id (apps/yeta/characters/<id>.md)'
        required: true
        type: string

concurrency:
  group: yeta-chat-${{ inputs.char }}   # 같은 캐릭터 = 직렬(세션 경합 차단) · 캐릭터 간 병렬(per-item 선례 thumb-make-<id>)
  cancel-in-progress: false             # 진행 중 턴 취소 = 답장 유실 → 금지(전 워크플로 공통)

permissions:
  contents: read   # 카드·스크립트 읽기만 — 레포 쓰기 없음(세션 = R2)
  issues: write    # 프레임이탈 관찰 리포트(Q.35) — fb_report가 단일 이슈(yeta-frame-break)에 발생 메타만 기록(대화 내용 0)

jobs:
  chat:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 웜 세션(SESSION_MAX 55분 + 마진 · 아이데이션③) — 답장 후 대기하며 후속 메시지 즉답(30초 목표의 본체)
    steps:
      - name: Checkout (shallow+sparse — 챗은 히스토리·전체 트리 불필요 = 비대 레포 클론 비용 회피)
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github
            shared
            apps/yeta
            push

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # claude CLI 주간 캐시 — news-ask 는 매 런 npm install -g(15~40s). 챗은 턴당 지연이 UX 라 캐시(§🧰 7일 캐시 정신).
      - name: CLI 캐시 키(ISO 주 단위 갱신 = 최신 CLI 주 1회 추종)
        id: week
        run: echo "week=$(date +%G%V)" >> "$GITHUB_OUTPUT"
      - name: Cache claude CLI
        id: clicache
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: claude-cli-${{ runner.os }}-${{ steps.week.outputs.week }}
      - name: Install Claude Code CLI (캐시 미스 시만)
        if: steps.clicache.outputs.cache-hit != 'true'
        run: npm install -g --prefix "$HOME/.npm-global" @anthropic-ai/claude-code
      - name: CLI PATH
        run: echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: pywebpush (per-reply 푸시용 · 백그라운드 설치 = 콜드 첫 답장 경로에서 3~6s 제거 — 첫 푸시 시점(첫 답장 생성 후 ≥10s)엔 설치 완료 · 미완이면 푸시만 생략=비치명 현행 계약 유지)
        run: (python3 -m pip install --quiet --break-system-packages pywebpush >/dev/null 2>&1 || true) &

      - name: 캐릭터 답장 생성 (claude -p · 세션 R2)
        id: chat
        env:
          # 인증 = 구독 OAuth 4계정 폴오버 체인(운영자 260704: yeta 독립 레포 · 로테이션 3계정 + MUTENONA 고정 꼬리·챗 안정성 우선).
          #   체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA · claude_failover 가 쿼터 한도 시 1단계씩 전환(nomute 방식 동일).
          #   ⚠️ Claude 구독 계정은 nomute와 공유 = yeta 사용분이 nomute 뉴스 쿼터에도 반영(운영자 감수).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1(체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(체인 실꼬리 = 항상 MUTENONA · 앞 3계정 소진 후)
          ACTIVE_ACCOUNT: ${{ vars.ACTIVE_ACCOUNT || 'MUTENO' }}
          # 세션 저장 = R2 비공개 버킷(YETA_R2_BUCKET 시크릿 — 공개 버킷 R2_BUCKET 과 별도). 계정 키는 기존 R2 시크릿 재사용.
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          YETA_R2_BUCKET: ${{ secrets.YETA_R2_BUCKET }}
          YETA_CHAR: ${{ inputs.char }}
          # 웜 루프 내 per-reply 즉시 푸시용(잡끝 푸시는 웜 대기만큼 지연 — 아이데이션③) · 없으면 스크립트가 조용히 생략
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          # 무전기(PTT) 답장 음성 — ⚠️유료 TTS·ptt 턴에서만 발동(yeta_tts.py — 클론 el: 우선·OpenAI 폴백 · 없으면 텍스트만)
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_nomute || secrets.OPENAI_API_KEY }}
          # KIMI-K3(문샷 종량제 · 운영자 260719 "KIMI_CODE_MUTE 키로 대화 연결") — 다이얼 kimi-k3 턴만 gen_out이
          #   Anthropic 호환 게이트로 국소 리라우트(서브셸 주입 = 구독 OAuth·폴오버 체인 무오염 · 아래 unset ANTHROPIC_* 과 무충돌)
          KIMI_API_KEY: ${{ secrets.KIMI_CODE_MUTE }}
          # YETA_SAFE 기본 ON(스크립트) = 런타임 CLAUDE.md 미주입(개발 세션 전용 · 운영자 260704) · 회귀 = YETA_SAFE: '0'
          YETA_SYS: '2'   # 운영자 260721 Q.35 승인 — 전 모델 시스템 '교체'(CC 기저 텍스트 미전송 = 구독 쿼터·종량제 공동 절감). 이탈 관찰축 = fb_report(이슈) + 세션훅 자동 부각 · 롤백 = 이 줄 제거(append 복귀)
          GH_ISSUE_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 프레임이탈 관찰 리포트 전용(fb_report → 이슈 · Q.35) — 잡 스코프 기본 토큰(issues:write)
        run: |
          [ -n "${CLAUDE_CODE_OAUTH_TOKEN}" ] || { echo "::error::OAuth 토큰 없음"; exit 1; }
          [ -n "${YETA_R2_BUCKET}" ] || { echo "YETA_R2_BUCKET 미설정 — 스캐폴드 no-op(운영자 R2 셋업 대기)"; exit 0; }
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN GDRIVE_SA_JSON GEMINI_API_KEY   # 유료 자동발사 오염 0(§📰 Lock 정신 · OPENAI/ELEVENLABS 는 PTT 음성 의도 사용)
          bash .github/scripts/yeta_chat.sh

      # (성공 푸시는 스크립트가 웜 루프 안에서 답장마다 즉시 발송 — push_reply() · 잡끝 스텝은 웜 대기만큼 지연이라 폐지 · 아이데이션③)
      # 실패 웹푸시 — 앱 닫아둔 유저도 답장 실패를 인지(§📰 실패알림=웹푸시 정신 · 평의회①⑥⑩). 세션 state=error 는 yeta_chat.sh 가 기록.
      - name: 실패 알림
        if: failure()
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          YETA_CHAR: ${{ inputs.char }}
        run: |
          [ -n "${VAPID_PRIVATE_KEY}" ] || exit 0
          [[ "$YETA_CHAR" =~ ^[a-z0-9_-]{1,24}$ ]] || exit 0
          python3 -m pip install --quiet --break-system-packages pywebpush 2>/dev/null || exit 0
          python3 .github/scripts/push_send.py --notify "yeta" "답장 생성에 실패했어 — 열어서 다시 보내줘" \
            --url "/?yeta=${YETA_CHAR}" --tag "nomute-yeta-${YETA_CHAR}" || true

      # 활성 계정이 이번 런에 쿼터로 폴오버됐으면(claude_failover 첫 스왑이 job-local 신호 파일을 남김) 누적 카운트 →
      #   임계(기본 2)회+ 면 vars.ACTIVE_ACCOUNT 를 체인 다음 계정으로 자동 전진 = 죽은 계정부터 시작하는 낭비 제거.
      #   ⚠️ GH_VARS_TOKEN(Variables 쓰기 PAT) 없으면 no-op = 라이브 무해(PAT 넣는 순간 켜짐). 카나리아 = 가장 자주 도는 챗 1곳.
      - name: 활성 계정 자동 승격(쿼터 누적 시 · GH_VARS_TOKEN 없으면 no-op)
        if: ${{ always() }}
        env:
          GH_VARS_TOKEN: ${{ secrets.GH_VARS_TOKEN }}
          ACTIVE_ACCOUNT: ${{ vars.ACTIVE_ACCOUNT || 'MUTENO' }}
        run: python3 shared/account_failover.py
