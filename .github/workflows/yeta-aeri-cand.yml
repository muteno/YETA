name: yeta-aeri-cand

# 신규 주민 '애리쌤' 이미지 일괄 생성·탑재(운영자 260721 "제미나이 말고 지피티로 얼굴 만들고 일반 사람처럼 탑재 · 지도도 · 표정 위주 8장").
# Gemini 월 지출 한도 429(260721 실측)로 OpenAI(gpt-image = yeta-char-art와 동일 축)로 전환 — 워크플로 파일명은 main 등록 유지(디스패치 안정).
# ⚠️ OpenAI 유료 종량제 = 수동 dispatch 전용(자동 트리거 금지 · 이미지 파이프 공통 규약).
# 산출 = ①초상 aeri.png(+webp)+av/aeri.webp+roster 배선 ②지도 char_aeri.png ③표정 8장 characters/aeri/ → 디스패치한 브랜치에 커밋.
on:
  workflow_dispatch:
    inputs:
      force:
        description: '1 = 기존 산출물도 재생성'
        required: false
        default: ''

concurrency:
  group: yeta-aeri-cand
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cand:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Pillow (스프라이트 크로마키 — 실패 시 원본 폴백)
        run: python3 -m pip install --quiet --break-system-packages pillow 2>/dev/null || echo "pillow 미설치 — 크로마키 폴백(원본 저장)"

      - name: 애리 이미지 3종 생성(초상·지도·표정8)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY_nomute: ${{ secrets.OPENAI_API_KEY_nomute }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
          FORCE: ${{ inputs.force }}
        run: python3 .github/scripts/yeta_aeri_cand.py

      - name: 커밋 (신규 있을 때만 · 디스패치 브랜치로)
        run: |
          git config user.name "yeta-aeri-cand[bot]"
          git config user.email "actions@users.noreply.github.com"
          # pathspec 분리 필수(한 add에 없는 경로 섞이면 전체 무스테이징 — yeta-face 전례)
          git add viewer/assets/yeta_char/ 2>/dev/null || true
          git add viewer/assets/yeta_map/ 2>/dev/null || true
          git add viewer/characters/aeri/ 2>/dev/null || true
          git add apps/yeta/characters/roster.json 2>/dev/null || true
          git diff --cached --quiet && { echo "신규 없음 — 커밋 생략"; exit 0; }
          git commit -m "애리쌤 이미지 생성·탑재 — 초상+av+roster 배선 · 지도 스프라이트 · 표정 8장 (yeta-aeri-cand dispatch)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            echo "push 재시도 ${i}/5 …"; sleep $((i*5))
          done
          echo "::error::push 5회 실패"; exit 1
