name: yeta-char-art

# 무음동 10인 판타지 캐릭터 초상(운영자 260707 "이거 기틀로 캐릭터 이미지 하나씩 · 판타지컬하게 · 완성형 만들고 편집").
# ⚠️ OpenAI 유료 종량제 = 수동 dispatch 전용(자동 트리거 금지 · 이미지 파이프 공통 규약).
# 산출 = viewer/assets/yeta_char/<id>.png(+webp) 을 main에 직접 커밋(git 정본 · 편집 베이스 · roster 자동주입 안 함).
on:
  workflow_dispatch:
    inputs:
      force:
        description: '1 = 기존 것도 재생성'
        required: false
        default: ''
      only:
        description: '특정 id 하나만(예: mudi · 비용절감 테스트)'
        required: false
        default: ''

concurrency:
  group: yeta-char-art
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  charart:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 판타지 캐릭터 초상 생성
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY_nomute: ${{ secrets.OPENAI_API_KEY_nomute }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
          FORCE: ${{ inputs.force }}
          YETA_CHAR_ONLY: ${{ inputs.only }}
        run: python3 .github/scripts/yeta_char_art.py

      - name: 커밋 (신규 있을 때만)
        run: |
          git config user.name "yeta-char-art[bot]"
          git config user.email "actions@users.noreply.github.com"
          # pathspec 분리 필수(한 add에 없는 경로 섞이면 전체 무스테이징 — yeta-face 전례). av/ = yeta_char/ 하위라 포함.
          git add viewer/assets/yeta_char/ 2>/dev/null || true
          git add apps/yeta/characters/roster.json 2>/dev/null || true
          git diff --cached --quiet && { echo "신규 없음 — 커밋 생략"; exit 0; }
          git commit -m "무음동 캐릭터 초상 생성 + 작은얼굴(av) 크롭 + roster avatar 자동주입 — yeta-char-art dispatch"
          # 장시간 런 중 main 전진 대비 — pull --rebase 후 push 재시도(신규 파일뿐이라 충돌 없음)
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push 재시도 ${i}/5 …"; sleep $((i*5))
          done
          echo "::error::push 5회 실패 — main 전진 과다"; exit 1
