# tmp — 하은 아바타(공개 R2) → 레포 반입 1회용. 개발 샌드박스 프록시가 r2.dev 차단 → Actions 러너 우회(read-only fetch·무과금).
# 연락처 vCard(사진 임베드) 소재 확보용 · 본 커밋에서 이 파일과 haeun_src.png 는 즉시 삭제(임시 반입 도구).
name: tmp-asset-fetch
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: fetch avatar → commit to this branch
        run: |
          mkdir -p viewer/assets/contacts
          curl -fSL "https://pub-83f8cf3892ae44c38bebf1805c954508.r2.dev/yeta_face/haeun.png?v=7d9c697a" -o viewer/assets/contacts/haeun_src.png
          file viewer/assets/contacts/haeun_src.png
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add viewer/assets/contacts/haeun_src.png
          git commit -m "tmp: 하은 아바타 반입(연락처 vCard 소재 — 후속 커밋서 정리)"
          git push
