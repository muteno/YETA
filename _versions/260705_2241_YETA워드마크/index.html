<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#121212">
<title>예타 : 가상현실 대화 섹션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="tokens.css">
<link rel="apple-touch-icon" href="assets/brand/yeta-icon-192.png">
<link rel="manifest" href="manifest.json">
<!-- PWA 웹앱(홈화면 설치·전체화면) — 안드로이드=manifest, iOS=아래 apple 메타(운영자 260704 "웹앱 형태로 여는것") -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="예타">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="예타">
<style>
  /* ── LEMONMILK (YETA 디스플레이 · 로컬 호스팅) ── */
  @font-face{font-family:'LEMONMILK';font-weight:700;font-style:normal;src:url('fonts/LEMONMILK-Bold.otf') format('opentype');font-display:swap}
  @font-face{font-family:'LEMONMILK';font-weight:300;font-style:normal;src:url('fonts/LEMONMILK-Light.otf') format('opentype');font-display:swap}
/* ── :root 토큰(색+구조) — 원본 viewer :root 계승(L19-80) ── */
  :root {
    /* 중립 표면·텍스트 — 흰색 + 스포티파이 블랙(운영자 260704 브랜드 통일) */
    --fg:#FFFFFF; --fg-2:#C4C9C4; --mut:#8B8F8A;
    --bg:#121212;   /* 앱 캔버스 = 스포티파이 블랙 */
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.06);
    /* 강조1 — 브랜드 라임(공통 컴포넌트·버튼·링·액티브·챗버블 · 운영자 260704 #CFFF40) */
    --accent:#CFFF40; --accent-rgb:207,255,64;
    /* 강조2 — 코발트 형광(보조강조·링크/정보·대비 · 운영자 260704) */
    --cobalt:#3D6BFF; --cobalt-rgb:61,107,255;
    /* 글래스모피즘 — 프로스티드 표면·엣지 하이라이트(구성도 표면3단 계승·260704) */
    --glass:rgba(255,255,255,.055); --glass-2:rgba(255,255,255,.09); --glass-line:rgba(255,255,255,.14);
    /* 그림자·배경 스크림(절대1: raw 금지→토큰 · 260704) */
    --shadow-card:0 24px 60px rgba(0,0,0,.42); --bg-scrim:linear-gradient(transparent 44%,rgba(0,0,0,.5) 76%,rgba(0,0,0,.85));
    /* 의미색 */
    --danger:#ff5b4a; --danger-rgb:255,91,74; --arm:#ffd93d;
    /* yeta 챗 — 내 버블=브랜드 라임(보라 폐지·전체 그린 통일 260704) · 캐릭터 버블=근흑 · 창=스포티파이 블랙 */
    --bubble-me:var(--accent); --bubble-ai:#1e2023; --yeta-bg:var(--bg);   /* 챗창 = 스포티파이 블랙 통일(--bg) · 글래스 엣지로 분리(운영자 260704) */
    /* 반지름 */
    --r-s:9px; --r-m:11px; --r-l:16px; --r-modal:22px; --r-pill:999px;
    /* 간격·버튼 */
    --sp-2:12px; --sp-3:18px; --btn:34px;
    /* 타이포 */
    --fs-h2:15px; --fs-h3:14px; --fs-body:15px; --fs-label:13px; --fs-sm:12px; --fs-xs:11px;
    --fw-x:800; --fw-b:700; --lh-base:1.6;
    /* 모션 */
    --ease:cubic-bezier(.2,.7,.3,1);
    /* 글래스 blur(구조토큰 — tokens.css 거울) */
    --blur-m:16px; --blur-l:24px;
    /* z (dialog=top-layer라 nm-toast만) */
    --z-float:60;
    /* 눌림 scale 사다리 */
    --press-m:.9; --press-l:.95; --press-s:.9;
    /* PIN·핀 액티브 = 브랜드 라임(옛 라이트/코발트 팔레트 폐지 → 다크·그린 통일 260704) */
    --pin-ac:var(--accent); --pin-ac-rgb:var(--accent-rgb);
  }
  /* reduced-motion = 눌림 토큰 전역 무효화(1) — 개별 transform:none 가드 대신 한 블록(분신술10·4뷰어 가드 불균형 해소) */
  @media (prefers-reduced-motion:reduce){ :root{ --press-m:1; --press-l:1; } }
/* ── body 기본(독립 뷰어) ── */
* { box-sizing:border-box; }
html,body { margin:0; height:100%; }
body { background:var(--yeta-bg,#121212); color:var(--fg); font-family:Pretendard,-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
::selection { background:var(--cobalt); color:var(--fg); }   /* 2차 강조 코발트 — 텍스트 선택(브랜드 통일 260704) */
/* ── 공통 컴포넌트(계승): nm-toast · msgUnfold · dialog · tool-x · gdots ── */
  .nm-toast { position:fixed; left:0; right:0; margin-inline:auto; bottom:calc(86px + env(safe-area-inset-bottom)); transform:translateY(18px);
    z-index:var(--z-float); width:min(92vw,430px); display:flex; align-items:center; gap:9px; padding:11px 15px; cursor:pointer;
    background:linear-gradient(135deg, rgba(42,13,11,.86), rgba(20,9,9,.86)); border:1px solid rgba(255,85,60,.5); border-radius:14px;
    box-shadow:0 12px 34px rgba(0,0,0,.5), 0 0 16px rgba(255,60,50,.22); color:#fff; font-size:13px; font-weight:700; line-height:1.35;
    backdrop-filter:blur(18px) saturate(1.3); -webkit-backdrop-filter:blur(18px) saturate(1.3); opacity:0; transition:opacity .3s, transform .3s; }   /* 글래스모피즘 = 배경 반투명(.95→.86 뒤 비침)+blur 14→18(운영자 260702) · 위치 78→86px 약간 위 */
  .nm-toast.show { opacity:1; transform:translateY(0); }
  .nm-toast .tg { flex:none; font-size:10.5px; font-weight:800; color:#fff; background:linear-gradient(135deg,#ff3b3b,#ff7a2f); border-radius:999px; padding:2px 8px; box-shadow:0 0 8px rgba(255,60,50,.5); }
  .nm-toast b { color:#ffd9cf; }
  .nm-toast .ft-msg { flex:1; min-width:0; }   /* 본문이 남는 폭 채움 → ✓·↻ 버튼 우측 정렬(운영자 260622) */
  .nm-toast .ft-act { flex:none; width:28px; height:28px; }   /* ✓확인·↻재시도·↗이동 = 28px(게이지 버튼 .sc-got/.unmerge-go 계승 높이) → 하단 토스트 액션 버튼 높이 정렬(운영자 260702). .sbtn 기틀(눌림 scale·.ok 플래시·ic-spin) 계승 */
  .nm-toast .ft-act svg { width:14px; height:14px; }   /* Q_ARR(원문·크기 미지정)·CHECK 아이콘 크기 통일 = 14(토스트 기존 유지) */
  @keyframes msgUnfold { from { opacity:0; transform:scale(.82) translateY(-8px); } to { opacity:1; transform:none; } }
  dialog {
    width:min(820px,94vw); max-height:88vh; color:var(--fg); padding:0;
    background:linear-gradient(165deg, rgba(27,44,32,.60), rgba(11,19,14,.70));
    backdrop-filter:blur(30px) saturate(1.6); -webkit-backdrop-filter:blur(30px) saturate(1.6);
    border:1px solid rgba(255,255,255,.13); border-radius:var(--r-modal);   /* 전 모달 22 통일(#dlg만 26이던 것) */
    box-shadow:0 30px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14);
  }
  dialog::backdrop { background:rgba(4,8,5,.46); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); }
  .tool-x { width:30px; height:30px; flex:none; display:grid; place-items:center; background:rgba(255,255,255,.06);
    color:var(--fg); border:1px solid var(--line); border-radius:9px; cursor:pointer; }
  .tool-x:hover { color:var(--accent); border-color:rgba(var(--accent-rgb),.4); }
  .tool-x:focus-visible { outline:none; box-shadow:0 0 0 2px rgba(var(--accent-rgb),.5); }   /* 키보드 포커스 링 */
  .tool-x, .dlg-x, .mx, .ed-x, .askx, .qh-x, .fb-x, .sc-rsn-x, .askimg-x, .pin-x { transition:transform .3s var(--ease); }
  .tool-x:active, .dlg-x:active, .mx:active, .ed-x:active, .askx:active, .qh-x:active, .fb-x:active, .sc-rsn-x:active, .askimg-x:active, .pin-x:active { transform:rotate(180deg) scale(var(--press-m,.92)); }
  .gdots { display:inline-block; width:1.1em; text-align:left; }
  .gdots i { font-style:normal; opacity:0; animation:gdots 1.4s infinite; }
  .gdots i:nth-child(2) { animation-delay:.22s; } .gdots i:nth-child(3) { animation-delay:.44s; }
  @keyframes gdots { 0% { opacity:0; } 25%,70% { opacity:1; } 95%,100% { opacity:0; } }
/* ── yeta 전용 CSS(L309-405) ── */
  /* ── yeta 말벗 제타(#yetadlg · 260703 v2 제타결) — 랜덤 페르소나 톡방. 다크 창(--yeta-bg) + 캐릭터 버블(--bubble-ai·아바타+이름) + 내 버블 제타 보라(--bubble-me) + *나레이션* 이탤릭. 페르소나 색 = --yeta-ac(JS가 roster color 주입 = "캐릭터 따라 톤" 운영자 컨셉) ── */
  /* 챗 = 풀스크린 글래스모피즘(운영자 260705 "팝업 아닌 화면 전체 + 딱 저 글래스 느낌"). 배경 = 라임 글래스 포스터(yeta-bg.webp) full-bleed + --bg-scrim 하단 딤(가독) — 수신 콜 화면(.ycall-bg) 확립 패턴 계승. 표면(헤더·버블·입력·인트로)은 글래스로 이 배경이 비쳐 글래스모피즘 성립. */
  #yetadlg { width:100vw; height:100dvh; max-width:100vw; max-height:100dvh; margin:0; padding:0; border:none; border-radius:0; box-shadow:none;
    background-image:linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.3)), var(--bg-scrim), url(assets/brand/yeta-bg.webp); background-size:cover, cover, 130%; background-position:center; background-repeat:no-repeat; background-color:var(--bg); color:var(--fg); overflow:hidden; --yeta-ac:var(--bubble-me);   /* 배경 이미지 가운데 기준 30% 확대(운영자 260705 #14 · 130%) · 딤/스크림은 cover 유지 */
    backdrop-filter:none; -webkit-backdrop-filter:none; }   /* 풀스크린 배경 이미지 = 글래스 표면이 비칠 base(불투명 --yeta-bg 폐지) */
  #yetadlg::backdrop { background:rgba(0,0,0,.6); }
  .yeta-wrap { display:flex; flex-direction:column; height:100%; }
  /* 챗 헤더 = 플로팅 알약(운영자 260705 "상하단 네비처럼 감싸서 띄워" · 레퍼런스 결) — [←뒤로][프사+이름 전폭][수화기] · 상대가 좌우 한 폭 차지 */
  .yeta-h { position:absolute; top:calc(10px + env(safe-area-inset-top)); left:10px; right:10px; z-index:3; display:flex; align-items:center; gap:8px; padding:7px 9px;
    background:var(--glass); border:1px solid var(--glass-line); border-radius:var(--r-pill);
    backdrop-filter:blur(var(--blur-l)) saturate(1.15); -webkit-backdrop-filter:blur(var(--blur-l)) saturate(1.15);
    box-shadow:inset 0 1px 0 var(--glass-line), var(--shadow-card); }
  .yeta-back { flex:none; width:var(--btn); height:var(--btn); display:grid; place-items:center; background:none; border:none; color:var(--fg-2); cursor:pointer; touch-action:manipulation; transition:transform .28s var(--ease); }   /* 뒤로가기(X 폐지 · 운영자 260705) = 메뉴2 복귀 · 픽토-온리 */
  .yeta-back svg { width:20px; height:20px; }
  .yeta-back:active { transform:scale(var(--press-m,.9)); }
  .yeta-back:focus-visible { outline:none; box-shadow:0 0 0 2px rgba(var(--accent-rgb),.5); border-radius:50%; }
  .yeta-h b { font-size:var(--fs-h2); font-weight:var(--fw-x); white-space:nowrap; flex:none; }   /* 이름 세로 줄바꿈 방지(좁은 헤더) — 태그가 ellipsis로 양보 */
  .yeta-h .yh-tag { font-size:var(--fs-xs); color:var(--mut); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .yeta-h .yh-r { margin-left:auto; display:flex; align-items:center; gap:6px; }   /* 우측 묶음 = 래퍼에 margin-left:auto(CII) */
  /* .yh-reset("새 대화") 제거(운영자 260705) — 2탭 armed 색 패턴은 call.js #yetaCallBtn.armed가 승계 */
  .yeta-stage { position:relative; flex:1; display:flex; flex-direction:row; overflow:hidden; }   /* 무대 = 2겹 배경 크로스페이드 + 좌 슬림 목록|우 로그 2열(운영자 260705 레퍼런스 "왔다갔다") */
  /* 좌 슬림 캐릭터 레일 — 이름 + 최근대화 ~5음절…(운영자 260705 "모바일 기준이니 짧게") · 현 상대 = 라임 표시 · 탭 = 화자 전환(draw·맥락 유지) */
  .yside { flex:none; width:104px; overflow-y:auto; padding:calc(64px + env(safe-area-inset-top)) 6px calc(76px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:6px; position:relative; z-index:2; scrollbar-width:none; }
  .yside::-webkit-scrollbar { display:none; }
  .yside[hidden] { display:none; }
  .ys-row { display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 4px 7px; background:var(--glass); border:1px solid var(--glass-line); border-radius:var(--r-l);
    color:var(--fg); font:inherit; cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent; text-align:center;
    backdrop-filter:blur(var(--blur-m)); -webkit-backdrop-filter:blur(var(--blur-m)); }
  .ys-row:active { transform:scale(var(--press-l,.95)); }
  .ys-row.cur { border-color:rgba(var(--accent-rgb),.5); box-shadow:inset 0 1px 0 var(--glass-line), 0 0 14px rgba(var(--accent-rgb),.14); }   /* 현 대화 상대 = 라임 링 */
  .ys-row .yava { width:38px; height:38px; }
  .ys-nm { font-size:var(--fs-xs); font-weight:var(--fw-x); max-width:88px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ys-last { font-size:10px; color:var(--mut); max-width:88px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }   /* 최근대화 스니펫(5음절대 + …) */
  .ybg { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity .6s var(--ease); pointer-events:none; }
  .ybg.on { opacity:.32; }   /* 페르소나/무드 = 라임 글래스 base 위 은은한 베일(운영자 260705 "배경은 준 이미지로" → 통일 backdrop 유지·무드 시스템[<<MOOD>>·yeta_bg.py]은 기틀 보존) */
  @media (prefers-reduced-motion:reduce) { .ybg { transition:none; } }
  .yeta-log { position:relative; flex:1; min-width:0; overflow-y:auto; padding:calc(64px + env(safe-area-inset-top)) var(--sp-2) calc(76px + env(safe-area-inset-bottom)) 6px; display:flex; flex-direction:column; gap:10px; }   /* 상하 패딩 = 플로팅 알약(헤더·입력) 클리어런스(운영자 260705) */
  .ymsg { display:flex; gap:8px; align-items:flex-start; max-width:86%; }   /* 캐릭터 메시지 = 아바타+이름+버블(제타 결) */
  .ymsg .yava { flex:none; width:32px; height:32px; border-radius:50%; display:grid; place-items:center; font-size:var(--fs-sm); font-weight:var(--fw-x);
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); color:var(--yeta-ac); margin-top:2px; }
  .yava.has-img, .yh-ava.has-img, .ypick-row .yava.has-img { background-size:cover; background-position:center; color:transparent; }   /* GPT 얼굴(yeta_face) = 이미지 채움·이니셜 숨김 · 없으면 이니셜 폴백 */
  .ymsg .ycol { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .ymsg .yname { font-size:var(--fs-xs); color:var(--mut); padding-left:2px; }
  .yb { padding:10px 13px; border-radius:var(--r-l); font-size:var(--fs-body); line-height:var(--lh-base); white-space:pre-wrap; word-break:break-word; }
  .yb i.yn { font-style:italic; color:var(--fg-2); opacity:.75; }   /* *나레이션* = 이탤릭 톤다운("대화 폰트 이런식" — 제타 결) */
  .yb.ai { background:var(--glass-2); border:1px solid var(--glass-line); border-top-left-radius:var(--r-s);
    backdrop-filter:blur(var(--blur-m)) saturate(1.3); -webkit-backdrop-filter:blur(var(--blur-m)) saturate(1.3); box-shadow:inset 0 1px 0 var(--glass-line); }   /* 캐릭터 버블 = 글래스(.ycall-line 계승 · 배경 비침) */
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))) { .yb.ai { background:var(--bubble-ai); } }   /* blur 미지원 = 불투명 폴백(--bubble-ai 배선 유지) */
  .yb.me { align-self:flex-end; max-width:78%; background:var(--bubble-me); color:var(--bg); border-top-right-radius:var(--r-s); }
  .yb.me i.yn { color:rgba(0,0,0,.6); }
  .yb.sys { align-self:center; background:var(--glass); border:1px solid var(--glass-line); border-radius:var(--r-pill); color:var(--fg-2); font-size:var(--fs-sm); padding:3px 12px;
    backdrop-filter:blur(var(--blur-m)); -webkit-backdrop-filter:blur(var(--blur-m)); }   /* 글래스 알약 — 배경 위 가독 */
  .yb.fail { align-self:flex-start; background:rgba(var(--danger-rgb),.08); border:1px solid rgba(var(--danger-rgb),.4); color:var(--danger); font-size:var(--fs-sm); }
  .yfail-retry { display:block; margin-top:7px; padding:5px 12px; border:1px solid rgba(var(--danger-rgb),.5); border-radius:var(--r-pill); background:none; color:var(--danger); font:inherit; font-size:var(--fs-xs); font-weight:var(--fw-b); cursor:pointer; }   /* 원탭 재시도(재타이핑 0) */

  padEl.innerHTML = KEYS.map(k => k === '' ? '<button class="lk-key empty" tabindex="-1"></button>' : k === 'back' ? `<button class="lk-key back" data-back="1" aria-label="지우기">${BSVG}</button>` : `<button class="lk-key" data-n="${k}">${k}</button>`).join('');
  const slots = [...slotsEl.children];
  const fill = () => slots.forEach((s, i) => s.classList.toggle('on', i < val.length));
  const flash = el => { if (!el) return; el.classList.add('hit'); setTimeout(() => el.classList.remove('hit'), 140); };
  const outLeft = () => { try { const u = +localStorage.getItem('yeta_pin_until') || 0; return Math.max(0, u - Date.now()); } catch { return 0; } };
  function setUnlocked(animate) {   // 언락 = PIN 창 촤르륵 닫고(pin-mode 해제) 네비 등장 · animate=라이브 언락만 슬라이드업(재방문 복원은 무애니)
    unlocked = true; ymain.classList.remove('pin-mode'); ymain.classList.add('unlocked'); yTab('char');   // 언락 = 바로 메뉴1 캐릭터(메인 포스터 화면 폐지 · 운영자 260705)
    if (animate) ymain.classList.add('reveal');
  }
  accessBtn.onclick = () => {   // 접속 = 락 열림 모션(고리 들림+라임 글로우) 후 PIN 모드 진입(운영자 260704)
    accessBtn.classList.add('unlocking');
    setTimeout(() => ymain.classList.add('pin-mode'), 420);
  };
  padEl.onclick = async e => {
    const b = e.target.closest('.lk-key'); if (!b || unlocked) return;
    if (b.dataset.back) { flash(b); val = val.slice(0, -1); errEl.textContent = ''; errEl.className = 'lk-err'; slotsEl.classList.remove('bad'); fill(); return; }
    if (outLeft()) { errEl.className = 'lk-err'; errEl.textContent = `PIN 오류 ${YM_MAX}회 — ${Math.ceil(outLeft() / 60000)}분 후 다시`; return; }
    if (b.dataset.n && val.length < YM_LEN) {
      flash(b); val += b.dataset.n; fill();
      if (val.length === YM_LEN) {
        const h = await ymHash(val);
        if (h === YM_PIN_H) {
          try { localStorage.removeItem('yeta_pin_fails'); localStorage.removeItem('yeta_pin_until'); } catch {}   // 언락 기억 안 함(yeta_pin_ok 미저장 = 매번 PIN · 운영자 260705) · 실패/잠금 카운터만 리셋
          errEl.textContent = ''; errEl.className = 'lk-err';   // "메뉴 활성" 배너 제거 — 대신 PIN 창 촤르륵 닫히고 네비 슬라이드업(운영자 260704)
          setTimeout(() => setUnlocked(true), 240);   // 마지막 슬롯 채워진 뒤 자연 전환
        } else {
          let n = 0; try { n = (+localStorage.getItem('yeta_pin_fails') || 0) + 1; localStorage.setItem('yeta_pin_fails', String(n)); if (n >= YM_MAX) localStorage.setItem('yeta_pin_until', String(Date.now() + YM_OUT_MS)); } catch {}
          slotsEl.classList.add('bad', 'shake'); errEl.className = 'lk-err'; errEl.textContent = n >= YM_MAX ? `PIN 오류 ${YM_MAX}회 — 10분 후 다시` : `PIN 번호가 틀립니다 (${n}/${YM_MAX})`;
          setTimeout(() => { val = ''; fill(); slotsEl.classList.remove('bad', 'shake'); if (!outLeft()) { errEl.textContent = ''; } }, 1400);
        }
      }
    }
  };
  ymain.classList.add('pin-mode');   // 진입할 때마다 PIN 즉시 표시(운영자 260705 · 언락 기억 제거 = 매번 요구 · 자물쇠 탭 없이 바로 · 세션 내 언락은 in-memory unlocked 유지, 리로드=다시 PIN)
  nav.onclick = e => {
    const b = e.target.closest('button'); if (!b) return;
    const tab = b.dataset.tab;
    if (!unlocked) { ymain.classList.add('pin-mode'); slotsEl.classList.add('shake'); setTimeout(() => slotsEl.classList.remove('shake'), 450); return; }
    if (tab === 'char' || tab === 'list') { yTab(tab); return; }   // 메뉴1 캐릭터 · 메뉴2 대화 목록(운영자 260705 재편)
    if (tab === 'chat') { openYeta(); return; }   // 메뉴3 지금 대화(임시 · 메뉴2와 통합 예정)
    miniToast('준비중 — 곧 열려');   // 설정(다음 머지)
  };
})();
/* PWA 서비스워커 등록 */
try { if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {}); } catch {}
/* ── (V1 260704) 진입점 = 메인 화면(YETA + PIN). 챗 자동오픈·재오픈 제거 — 챗은 PIN 해제 후 '대화' 탭에서만 연다.
      챗 닫기 = 메인 복귀(dialog 아래 .ymain 상주). 딥링크(?yeta=)만 예외 진입(위 L576). ── */
</script>
<script src="call.js" defer></script>   <!-- [call 모듈 훅 ②] yeta 음성 모듈(걸려오는 전화 + 무전기 PTT + 프리미엄 배지) — 플러그인 · 제거 = 이 태그 + yLoad 훅 ① -->
