<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#121212">
<title>YETA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="tokens.css">
<link rel="apple-touch-icon" href="assets/brand/yeta-icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  /* ── LEMONMILK (YETA 디스플레이 · 로컬 호스팅) ── */
  @font-face{font-family:'LEMONMILK';font-weight:700;font-style:normal;src:url('fonts/LEMONMILK-Bold.otf') format('opentype');font-display:swap}
  @font-face{font-family:'LEMONMILK';font-weight:300;font-style:normal;src:url('fonts/LEMONMILK-Light.otf') format('opentype');font-display:swap}
/* ── :root 토큰(색+구조) — 원본 viewer :root 계승(L19-80) ── */
  :root {
    /* 중립 표면·텍스트 — 흰색 + 스포티파이 블랙(운영자 260704 브랜드 통일) */
    --fg:#FFFFFF; --fg-2:#C4C9C4; --mut:#8B8F8A;
    --bg:#121212;   /* 앱 캔버스 = 스포티파이 블랙 */
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.06);
    /* 강조1 — 브랜드 라임(공통 컴포넌트·버튼·링·액티브·챗버블 · 운영자 260704 #CFFF40) */
    --accent:#CFFF40; --accent-rgb:207,255,64;
    /* 강조2 — 코발트 형광(보조강조·링크/정보·대비 · 운영자 260704) */
    --cobalt:#3D6BFF; --cobalt-rgb:61,107,255;
    /* 글래스모피즘 — 프로스티드 표면·엣지 하이라이트(구성도 표면3단 계승·260704) */
    --glass:rgba(255,255,255,.055); --glass-2:rgba(255,255,255,.09); --glass-line:rgba(255,255,255,.14);
    /* 그림자·배경 스크림(절대1: raw 금지→토큰 · 260704) */
    --shadow-card:0 24px 60px rgba(0,0,0,.42); --bg-scrim:linear-gradient(transparent 44%,rgba(0,0,0,.5) 76%,rgba(0,0,0,.85));
    /* 의미색 */
    --danger:#ff5b4a; --danger-rgb:255,91,74; --arm:#ffd93d;
    /* yeta 챗 — 내 버블=브랜드 라임(보라 폐지·전체 그린 통일 260704) · 캐릭터 버블=근흑 · 창=스포티파이 블랙 */
    --bubble-me:var(--accent); --bubble-ai:#1e2023; --yeta-bg:var(--bg);   /* 챗창 = 스포티파이 블랙 통일(--bg) · 글래스 엣지로 분리(운영자 260704) */
    /* 반지름 */
    --r-s:9px; --r-m:11px; --r-l:16px; --r-modal:22px; --r-pill:999px;
    /* 간격·버튼 */
    --sp-2:12px; --sp-3:18px; --btn:34px;
    /* 타이포 */
    --fs-h2:15px; --fs-h3:14px; --fs-body:15px; --fs-label:13px; --fs-sm:12px; --fs-xs:11px;
    --fw-x:800; --fw-b:700; --lh-base:1.6;
    /* 모션 */
    --ease:cubic-bezier(.2,.7,.3,1);
    /* 글래스 blur(구조토큰 — tokens.css 거울) */
    --blur-m:16px; --blur-l:24px;
    /* z (dialog=top-layer라 nm-toast만) */
    --z-float:60;
    /* 눌림 scale 사다리 */
    --press-m:.9; --press-l:.95; --press-s:.9;
    /* PIN·핀 액티브 = 브랜드 라임(옛 라이트/코발트 팔레트 폐지 → 다크·그린 통일 260704) */
    --pin-ac:var(--accent); --pin-ac-rgb:var(--accent-rgb);
  }
  /* reduced-motion = 눌림 토큰 전역 무효화(1) — 개별 transform:none 가드 대신 한 블록(분신술10·4뷰어 가드 불균형 해소) */
  @media (prefers-reduced-motion:reduce){ :root{ --press-m:1; --press-l:1; } }
/* ── body 기본(독립 뷰어) ── */
* { box-sizing:border-box; }
html,body { margin:0; height:100%; }
body { background:var(--yeta-bg,#121212); color:var(--fg); font-family:Pretendard,-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
::selection { background:var(--cobalt); color:var(--fg); }   /* 2차 강조 코발트 — 텍스트 선택(브랜드 통일 260704) */
/* ── 공통 컴포넌트(계승): nm-toast · msgUnfold · dialog · tool-x · gdots ── */
  .nm-toast { position:fixed; left:0; right:0; margin-inline:auto; bottom:calc(86px + env(safe-area-inset-bottom)); transform:translateY(18px);
    z-index:var(--z-float); width:min(92vw,430px); display:flex; align-items:center; gap:9px; padding:11px 15px; cursor:pointer;
    background:linear-gradient(135deg, rgba(42,13,11,.86), rgba(20,9,9,.86)); border:1px solid rgba(255,85,60,.5); border-radius:14px;
    box-shadow:0 12px 34px rgba(0,0,0,.5), 0 0 16px rgba(255,60,50,.22); color:#fff; font-size:13px; font-weight:700; line-height:1.35;
    backdrop-filter:blur(18px) saturate(1.3); -webkit-backdrop-filter:blur(18px) saturate(1.3); opacity:0; transition:opacity .3s, transform .3s; }   /* 글래스모피즘 = 배경 반투명(.95→.86 뒤 비침)+blur 14→18(운영자 260702) · 위치 78→86px 약간 위 */
  .nm-toast.show { opacity:1; transform:translateY(0); }
  .nm-toast .tg { flex:none; font-size:10.5px; font-weight:800; color:#fff; background:linear-gradient(135deg,#ff3b3b,#ff7a2f); border-radius:999px; padding:2px 8px; box-shadow:0 0 8px rgba(255,60,50,.5); }
  .nm-toast b { color:#ffd9cf; }
  .nm-toast .ft-msg { flex:1; min-width:0; }   /* 본문이 남는 폭 채움 → ✓·↻ 버튼 우측 정렬(운영자 260622) */
  .nm-toast .ft-act { flex:none; width:28px; height:28px; }   /* ✓확인·↻재시도·↗이동 = 28px(게이지 버튼 .sc-got/.unmerge-go 계승 높이) → 하단 토스트 액션 버튼 높이 정렬(운영자 260702). .sbtn 기틀(눌림 scale·.ok 플래시·ic-spin) 계승 */
  .nm-toast .ft-act svg { width:14px; height:14px; }   /* Q_ARR(원문·크기 미지정)·CHECK 아이콘 크기 통일 = 14(토스트 기존 유지) */
  @keyframes msgUnfold { from { opacity:0; transform:scale(.82) translateY(-8px); } to { opacity:1; transform:none; } }
  dialog {
    width:min(820px,94vw); max-height:88vh; color:var(--fg); padding:0;
    background:linear-gradient(165deg, rgba(27,44,32,.60), rgba(11,19,14,.70));
    backdrop-filter:blur(30px) saturate(1.6); -webkit-backdrop-filter:blur(30px) saturate(1.6);
    border:1px solid rgba(255,255,255,.13); border-radius:var(--r-modal);   /* 전 모달 22 통일(#dlg만 26이던 것) */
    box-shadow:0 30px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14);
  }
  dialog::backdrop { background:rgba(4,8,5,.46); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); }
  .tool-x { width:30px; height:30px; flex:none; display:grid; place-items:center; background:rgba(255,255,255,.06);
    color:var(--fg); border:1px solid var(--line); border-radius:9px; cursor:pointer; }
  .tool-x:hover { color:var(--accent); border-color:rgba(var(--accent-rgb),.4); }
  .tool-x:focus-visible { outline:none; box-shadow:0 0 0 2px rgba(var(--accent-rgb),.5); }   /* 키보드 포커스 링 */
  .tool-x, .dlg-x, .mx, .ed-x, .askx, .qh-x, .fb-x, .sc-rsn-x, .askimg-x, .pin-x { transition:transform .3s var(--ease); }
  .tool-x:active, .dlg-x:active, .mx:active, .ed-x:active, .askx:active, .qh-x:active, .fb-x:active, .sc-rsn-x:active, .askimg-x:active, .pin-x:active { transform:rotate(180deg) scale(var(--press-m,.92)); }
  .gdots { display:inline-block; width:1.1em; text-align:left; }
  .gdots i { font-style:normal; opacity:0; animation:gdots 1.4s infinite; }
  .gdots i:nth-child(2) { animation-delay:.22s; } .gdots i:nth-child(3) { animation-delay:.44s; }
  @keyframes gdots { 0% { opacity:0; } 25%,70% { opacity:1; } 95%,100% { opacity:0; } }
/* ── yeta 전용 CSS(L309-405) ── */
  /* ── yeta 말벗 제타(#yetadlg · 260703 v2 제타결) — 랜덤 페르소나 톡방. 다크 창(--yeta-bg) + 캐릭터 버블(--bubble-ai·아바타+이름) + 내 버블 제타 보라(--bubble-me) + *나레이션* 이탤릭. 페르소나 색 = --yeta-ac(JS가 roster color 주입 = "캐릭터 따라 톤" 운영자 컨셉) ── */
  #yetadlg { width:min(600px,94vw); height:min(88dvh,760px); padding:0; border:1px solid var(--glass-line); border-radius:var(--r-modal); box-shadow:inset 0 1px 0 var(--glass-line), var(--shadow-card);
    background:var(--yeta-bg); color:var(--fg); overflow:hidden; --yeta-ac:var(--bubble-me);
    backdrop-filter:none; -webkit-backdrop-filter:none; }   /* 불투명 bg → 전역 dialog blur30 상속 낭비 차단(#editdlg 패턴 · 평의회④) */
  #yetadlg::backdrop { background:rgba(0,0,0,.6); }
  @media (max-width:640px) { #yetadlg { margin:auto; } }   /* 전역 dialog{margin:0}(모바일) 좌상단 쏠림 함정 교정 — #tooldlg 전례(평의회④) */
  .yeta-wrap { display:flex; flex-direction:column; height:100%; }
  .yeta-h { display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line2); flex:none; }
  .yeta-h b { font-size:var(--fs-h2); font-weight:var(--fw-x); }
  .yeta-h .yh-tag { font-size:var(--fs-xs); color:var(--mut); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .yeta-h .yh-r { margin-left:auto; display:flex; align-items:center; gap:6px; }   /* 우측 묶음 = 래퍼에 margin-left:auto(CII) */
  .yh-reset { border:none; background:none; color:var(--mut); font-size:var(--fs-sm); font-weight:var(--fw-b); cursor:pointer; padding:4px 6px; white-space:nowrap; }
  .yh-reset.armed { color:var(--arm); }   /* 2탭 재확인 = 텍스트 교체(§📐) */
  .yeta-stage { position:relative; flex:1; display:flex; flex-direction:column; overflow:hidden; }   /* 무대 = 2겹 배경 크로스페이드(§🎬 배너 디졸브 축소판 · 260703) */
  .ybg { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity .6s var(--ease); pointer-events:none; }
  .ybg.on { opacity:1; }
  @media (prefers-reduced-motion:reduce) { .ybg { transition:none; } }
  .yeta-log { position:relative; flex:1; overflow-y:auto; padding:var(--sp-3) var(--sp-2) var(--sp-2); display:flex; flex-direction:column; gap:10px; }   /* 페르소나 배경 훅 — JS가 어두운 그라데+roster bg 이미지 주입(운영자 감정별 이미지 대기) */
  .ymsg { display:flex; gap:8px; align-items:flex-start; max-width:86%; }   /* 캐릭터 메시지 = 아바타+이름+버블(제타 결) */
  .ymsg .yava { flex:none; width:32px; height:32px; border-radius:50%; display:grid; place-items:center; font-size:var(--fs-sm); font-weight:var(--fw-x);
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); color:var(--yeta-ac); margin-top:2px; }
  .yava.has-img, .yh-ava.has-img, .ypick-row .yava.has-img { background-size:cover; background-position:center; color:transparent; }   /* GPT 얼굴(yeta_face) = 이미지 채움·이니셜 숨김 · 없으면 이니셜 폴백 */
  .ymsg .ycol { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .ymsg .yname { font-size:var(--fs-xs); color:var(--mut); padding-left:2px; }
  .yb { padding:10px 13px; border-radius:var(--r-l); font-size:var(--fs-body); line-height:var(--lh-base); white-space:pre-wrap; word-break:break-word; }
  .yb i.yn { font-style:italic; color:var(--fg-2); opacity:.75; }   /* *나레이션* = 이탤릭 톤다운("대화 폰트 이런식" — 제타 결) */
  .yb.ai { background:var(--bubble-ai); border:1px solid rgba(255,255,255,.05); border-top-left-radius:var(--r-s); }
  .yb.me { align-self:flex-end; max-width:78%; background:var(--bubble-me); color:var(--bg); border-top-right-radius:var(--r-s); }
  .yb.me i.yn { color:rgba(0,0,0,.6); }
  .yb.sys { align-self:center; background:none; border:none; color:var(--mut); font-size:var(--fs-sm); padding:2px 4px; }
  .yb.fail { align-self:flex-start; background:rgba(var(--danger-rgb),.08); border:1px solid rgba(var(--danger-rgb),.4); color:var(--danger); font-size:var(--fs-sm); }
  .yfail-retry { display:block; margin-top:7px; padding:5px 12px; border:1px solid rgba(var(--danger-rgb),.5); border-radius:var(--r-pill); background:none; color:var(--danger); font:inherit; font-size:var(--fs-xs); font-weight:var(--fw-b); cursor:pointer; }   /* 원탭 재시도(재타이핑 0) */
  .yfail-retry:active { transform:scale(var(--press-m,.9)); }
  /* 방 상단 캐릭터 소개 배너 — 대화방 진입 시 최상단(운영자 260703 "캐릭터 소개가 위에 나오고") · 무채색 글래스 결 */
  .yintro { align-self:stretch; display:flex; flex-direction:column; align-items:center; text-align:center; gap:6px; padding:var(--sp-2) var(--sp-3) 0; }
  .yintro-ava { width:66px; height:66px; border-radius:50%; display:grid; place-items:center; font-size:var(--fs-h2); font-weight:var(--fw-x); background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:var(--yeta-ac); background-size:cover; background-position:center; }
  .yintro-ava.has-img { color:transparent; border-color:rgba(255,255,255,.18); }
  .yintro-name { font-size:var(--fs-h2); font-weight:var(--fw-x); color:var(--fg); margin-top:2px; }
  .yintro-tag { font-size:var(--fs-sm); font-weight:var(--fw-b); color:var(--yeta-ac); }
  .yintro-desc { font-size:var(--fs-sm); color:var(--mut); line-height:var(--lh-base); max-width:36ch; }
  .yintro-sep { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent); margin-top:8px; }
  /* 연속 메시지 그룹핑 — 직전과 같은 화자면 아바타·이름 생략(카톡/제타 톡방 결 · 운영자 260703) */
  .ymsg.cont { margin-top:-6px; }   /* .yeta-log gap 10 상쇄 = 바짝 붙임 */
  .ymsg.cont .yava { visibility:hidden; }
  .ymsg.cont .yname { display:none; }
  .yb.me.cont { margin-top:-6px; }
  .yb-cap { display:block; margin-top:5px; font-size:var(--fs-xs); color:var(--mut); opacity:.8; font-variant-numeric:tabular-nums; font-style:normal; }   /* 다이얼 체감 캡션(모델·노력·초 = tabular) */
  /* 타이핑 = 캐릭터 버블(카톡·제타 결 — 아바타+이름+점 3개 바운스 버블 · 운영자 260703 "입력하는 게 자연스럽게·오래 걸려도 입력 중 느낌 확실히") */
  .ymsg.ytyp .yb.ai { padding:13px 16px; }
  .ytdots { display:inline-flex; gap:5px; align-items:center; height:1.2em; }
  .ytdots i { width:6px; height:6px; border-radius:50%; background:var(--fg-2); animation:ytdot 1.15s ease-in-out infinite; }
  .ytdots i:nth-child(2) { animation-delay:.14s; } .ytdots i:nth-child(3) { animation-delay:.28s; }
  @keyframes ytdot { 0%,55%,100% { transform:none; opacity:.4; } 25% { transform:translateY(-4px); opacity:1; } }
  /* 촤르륵 등장/퇴장 — 신규 노드에만 .in(폴 재렌더 재트리거 방지 = JS가 인덱스 키드) · 회수/삭제 = .out 접힘 후 제거(운영자 "지워도 촤르륵") */
  @keyframes ybIn { from { opacity:0; transform:translateY(10px) scale(.92); } }
  @keyframes ybOut { to { opacity:0; transform:translateY(8px) scale(.92); } }
  .yeta-log .in { animation:ybIn .3s cubic-bezier(.22,.61,.36,1) both; transform-origin:bottom left; }
  .yeta-log .yb.me.in { transform-origin:bottom right; }
  .yeta-log .out { animation:ybOut .2s var(--ease) both; pointer-events:none; }
  @media (prefers-reduced-motion:reduce) { .yeta-log .in, .yeta-log .out, .ytdots i { animation:none; } }
  .yeta-setup { padding:var(--sp-3); color:var(--mut); font-size:var(--fs-label); line-height:1.7; }
  .yeta-in { flex:none; display:flex; gap:8px; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); }
  .yeta-in[hidden] { display:none; }   /* 리스트뷰에서 입력행 숨김 — display:flex가 hidden(display:none) 이기던 버그 교정(운영자 260703 스샷) */
  .yeta-in textarea { flex:1; resize:none; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:var(--r-l); color:var(--fg);
    font-size:var(--fs-body); line-height:1.4; padding:10px 13px; max-height:120px; font-family:inherit; text-align:center; }   /* 메시지칸 중앙정렬(운영자 260703) */
  .yeta-in textarea:focus-visible { outline:none; border-color:var(--yeta-ac); box-shadow:0 0 0 2px rgba(255,255,255,.06); }
  .yeta-send { flex:none; width:var(--btn); height:var(--btn); align-self:flex-end; border-radius:50%; border:none;
    background:var(--bubble-me); color:var(--bg); display:grid; place-items:center; cursor:pointer; touch-action:manipulation; }   /* 브랜드 라임 원형 전송(CTA · 보라 폐지 260704) · touch-action=폰 탭 신뢰성(스크롤 팬에 안 먹힘 · 레포 관례) */
  .yeta-send:active { transform:scale(var(--press-m,.9)); }
  .yeta-send:disabled { opacity:.4; pointer-events:none; }
  /* 페르소나 픽커 — 헤더 이름 탭 → 주민 직접 선택(msgpop 무채 글래스 계승 · saturate(0)=뒤 색 비침 차단 · §🎨 무채 크롬) */
  .yeta-who { display:flex; align-items:center; gap:8px; min-width:0; background:none; border:none; color:inherit; font:inherit; cursor:pointer; padding:0; text-align:left; touch-action:manipulation; }

  log.insertAdjacentHTML('beforeend', `<div class="yb me in">${yFmt(text)}</div>` + yTypingHtml(!_yTypOn));
  _yTypOn = true;
  const _typEl = log.lastElementChild, _meEl = _typEl.previousElementSibling;   // 실패 시 회수용(평의회⑨)
  log.scrollTop = log.scrollHeight;
  const r = await yApi('send', { text, model: YDIAL.model, effort: YDIAL.effort }).catch(() => ({ error: '네트워크 실패 — 다시 보내줘' }));
  btn.disabled = false;
  if (!r.ok) {
    yOut(_typEl); yOut(_meEl); _yTypOn = false; ta.value = text;   // 낙관 노드 = 촤르륵 접혀 복귀 + 입력 복원(운영자 "지워도 촤르륵")
    log.insertAdjacentHTML('beforeend', `<div class="yb fail in">${esc(r.error || '전송 실패')}</div>`); _yFailOn = true; log.scrollTop = log.scrollHeight; return;
  }
  if (_yLastN >= 0) _yLastN += 1;   // 낙관 버블은 이미 촤르륵함 — 폴 확정 재렌더에서 같은 턴 재애니 방지
  ta.focus();
  yStartPoll();
}
$('#yetaSend').addEventListener('click', ySend);
$('#yetaText').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); ySend(); } });   // 폰 enterkeyhint=send · Shift+Enter=줄바꿈
$('#yetaText').addEventListener('input', e => { const t = e.target; t.style.height = 'auto'; t.style.height = Math.min(120, t.scrollHeight) + 'px'; });
$('#yetaDice').addEventListener('click', e => { e.stopPropagation(); yDraw(); });   // 🎲 재뽑기 — 맥락 유지·화자 교체
function yResetArmClear() { _yResetArm = 0; clearTimeout(_yResetT); const b = $('#yetaReset'); b.textContent = '새 대화'; b.classList.remove('armed'); }
$('#yetaReset').addEventListener('click', async () => {   // 2탭 재확인 = 텍스트 교체(§📐)
  const b = $('#yetaReset');
  if (!_yResetArm) { _yResetArm = 1; b.textContent = '지우고 새로?'; b.classList.add('armed'); _yResetT = setTimeout(yResetArmClear, 2600); return; }
  yResetArmClear();
  await yApi('reset').catch(() => null);
  YSESS = null; YCUR = null; _yLastN = -1; _yTypOn = false; _yFailOn = false; yShowList();   // 리셋 = 맥락 비우고 SNS 선택 리스트로(랜덤 자동 대신 선택 먼저)
});
$('#yetaX').addEventListener('click', () => yetadlg.close());
yetadlg.addEventListener('close', () => { document.documentElement.style.overflow = ''; yStopPoll(); yPickToggle(false);
  if (_yetaPop) { _yetaPop = false; } else if (history.state && history.state.ydlg) { try { history.back(); } catch {} } });   // X·백드롭 닫힘 = push 칸 회수(#dlg 패턴)
window.addEventListener('popstate', () => { if (_composeRecovering) return; if (yetadlg.open) { _yetaPop = true; yetadlg.close(); } });   // 폰 뒤로가기 = 닫기(컴포즈 회수 가드 계승)
const _yetaBtnEl = $('#yetaBtn'); if (_yetaBtnEl) _yetaBtnEl.addEventListener('click', e => { e.stopPropagation(); hidePmenu(); openYeta(); });   // pmenu 진입(stopPropagation = #msgbtn 패턴)
try { if (new URLSearchParams(location.search).get('yeta')) setTimeout(() => openYeta(), 400); } catch {}   // 답장 웹푸시 딥링크(/?yeta=main — sw.js notificationclick)

/* ═══ YETA 메인 PIN 게이트 (nomute lk- 이식 · SHA-256·5회=10분 잠금 · 260704 V1) ═══ */
(function () {
  const ymain = $('#ymain'), slotsEl = $('#ymSlots'), padEl = $('#ymPad'), errEl = $('#ymErr'), accessBtn = $('#ymAccess'), nav = $('#ynav');
  const YM_PIN_H = 'ce019bfca1b22ed8c7dd882b875e65a97048a467f64d717b4ebb76d1cd644b63';                    // sha256('<PIN>:yeta') — V1 기본 PIN, 운영자 변경 예정
  const YM_LEN = 4, YM_MAX = 5, YM_OUT_MS = 600000;
  const BSVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 5H9l-6 7 6 7h11a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z"/><path d="M16 9l-4 4M12 9l4 4"/></svg>';
  const KEYS = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '', '0', 'back'];
  let val = '', unlocked = false;
  const ymHash = async p => { const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p + ':yeta')); return [...new Uint8Array(d)].map(b => b.toString(16).padStart(2, '0')).join(''); };
  padEl.innerHTML = KEYS.map(k => k === '' ? '<button class="lk-key empty" tabindex="-1"></button>' : k === 'back' ? `<button class="lk-key back" data-back="1" aria-label="지우기">${BSVG}</button>` : `<button class="lk-key" data-n="${k}">${k}</button>`).join('');
  const slots = [...slotsEl.children];
  const fill = () => slots.forEach((s, i) => s.classList.toggle('on', i < val.length));
  const flash = el => { if (!el) return; el.classList.add('hit'); setTimeout(() => el.classList.remove('hit'), 140); };
  const outLeft = () => { try { const u = +localStorage.getItem('yeta_pin_until') || 0; return Math.max(0, u - Date.now()); } catch { return 0; } };
  function setUnlocked() { unlocked = true; ymain.classList.add('unlocked'); }
  accessBtn.onclick = () => ymain.classList.add('pin-mode');
  padEl.onclick = async e => {
    const b = e.target.closest('.lk-key'); if (!b || unlocked) return;
    if (b.dataset.back) { flash(b); val = val.slice(0, -1); errEl.textContent = ''; errEl.className = 'lk-err'; slotsEl.classList.remove('bad'); fill(); return; }
    if (outLeft()) { errEl.className = 'lk-err'; errEl.textContent = `PIN 오류 ${YM_MAX}회 — ${Math.ceil(outLeft() / 60000)}분 후 다시`; return; }
    if (b.dataset.n && val.length < YM_LEN) {
      flash(b); val += b.dataset.n; fill();
      if (val.length === YM_LEN) {
        const h = await ymHash(val);
        if (h === YM_PIN_H) {
          try { localStorage.setItem('yeta_pin_ok', '1'); localStorage.removeItem('yeta_pin_fails'); localStorage.removeItem('yeta_pin_until'); } catch {}
          errEl.className = 'lk-ok'; errEl.textContent = '잠금 해제 — 메뉴 활성'; setUnlocked();
        } else {
          let n = 0; try { n = (+localStorage.getItem('yeta_pin_fails') || 0) + 1; localStorage.setItem('yeta_pin_fails', String(n)); if (n >= YM_MAX) localStorage.setItem('yeta_pin_until', String(Date.now() + YM_OUT_MS)); } catch {}
          slotsEl.classList.add('bad', 'shake'); errEl.className = 'lk-err'; errEl.textContent = n >= YM_MAX ? `PIN 오류 ${YM_MAX}회 — 10분 후 다시` : `PIN 번호가 틀립니다 (${n}/${YM_MAX})`;
          setTimeout(() => { val = ''; fill(); slotsEl.classList.remove('bad', 'shake'); if (!outLeft()) { errEl.textContent = ''; } }, 1400);
        }
      }
    }
  };
  try { if (localStorage.getItem('yeta_pin_ok') === '1') setUnlocked(); } catch {}   // 재방문 = 이미 해제면 통과(로컬 소프트 게이트)
  nav.onclick = e => {
    const b = e.target.closest('button'); if (!b) return;
    const tab = b.dataset.tab;
    if (tab === 'main') return;
    if (!unlocked) { ymain.classList.add('pin-mode'); slotsEl.classList.add('shake'); setTimeout(() => slotsEl.classList.remove('shake'), 450); return; }
    if (tab === 'chat') { openYeta(); return; }
    miniToast('준비중 — 곧 열려');   // 캐릭터·설정(다음 머지)
  };
})();

      챗 닫기 = 메인 복귀(dialog 아래 .ymain 상주). 딥링크(?yeta=)만 예외 진입(위 L576). ── */
