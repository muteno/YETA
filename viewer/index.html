  /* ── LEMONMILK (YETA 디스플레이 · 로컬 호스팅) ── */
  @font-face{font-family:'LEMONMILK';font-weight:700;font-style:normal;src:url('fonts/LEMONMILK-Bold.otf') format('opentype');font-display:swap}
  @font-face{font-family:'LEMONMILK';font-weight:300;font-style:normal;src:url('fonts/LEMONMILK-Light.otf') format('opentype');font-display:swap}
  @font-face{font-family:'LEMONMILK';font-weight:400;font-style:normal;src:url('fonts/LEMONMILK-Regular.otf') format('opentype');font-display:swap}   /* 시즌 subnav 날짜(운영자 260707 "Regular 정방향 연하게") */
  @font-face{font-family:'LEMONMILK';font-weight:700;font-style:italic;src:url('fonts/LEMONMILK-BoldItalic.otf') format('opentype');font-display:swap}   /* 시즌 배지 SEASON 01(운영자 260707 "S1 이탤릭") */
  /* ── Paperlogy (한글 대체 폰트 · 운영자 260707 "설정에서 영문/한글 따로 · 볼드 고정 폰트만" · 비상업 테스트) — 9웨이트 전량 등재 · 사용 face만 브라우저가 fetch ── */

  @font-face{font-family:'Paperlogy';font-weight:200;src:url('fonts/Paperlogy-2ExtraLight.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'Paperlogy';font-weight:300;src:url('fonts/Paperlogy-3Light.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'Paperlogy';font-weight:400;src:url('fonts/Paperlogy-4Regular.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'Paperlogy';font-weight:500;src:url('fonts/Paperlogy-5Medium.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'Paperlogy';font-weight:600;src:url('fonts/Paperlogy-6SemiBold.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'Paperlogy';font-weight:700;src:url('fonts/Paperlogy-7Bold.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'Paperlogy';font-weight:800;src:url('fonts/Paperlogy-8ExtraBold.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'Paperlogy';font-weight:900;src:url('fonts/Paperlogy-9Black.ttf') format('truetype');font-display:swap}
/* ── :root 토큰(색+구조) — 원본 viewer :root 계승(L19-80) ── */
  :root {
    /* 중립 표면·텍스트 — 흰색 + 스포티파이 블랙(운영자 260704 브랜드 통일) */
    --fg:#FFFFFF; --fg-rgb:255,255,255; --fg-2:#E7ECE7; --mut:#8B8F8A;   /* fg-2 = 서브텍스트 리프트(언락 밝기 플그 운영자 확정) · --fg-rgb = 실버 플레이트/테두리 알파용(운영자 260708 IDOL 테두리 · --X-rgb 패턴 계승) */
    --bg:#161716;   /* 앱 캔버스 = 스포티파이 블랙 리프트(그린 틴트 근흑 · 언락 밝기 플그 운영자 확정 = 기틀 갱신 승인) */
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.06);
    /* 강조1 — 브랜드 라임(공통 컴포넌트·버튼·링·액티브·챗버블 · 운영자 260704 #CFFF40) */
    --accent:#CFFF40; --accent-rgb:207,255,64;
    /* 강조2 — 코발트 형광(보조강조·링크/정보·대비 · 운영자 260704) */
    --cobalt:#3D6BFF; --cobalt-rgb:61,107,255;
    /* 등급 — 시즌 진한 레드보라(특별등급 축 · CTA 아님 — 배지·시즌 연출 전용 · 운영자 260707 승인 · 기틀감사 APPROVE) */
    --season:#8E2DBF; --season-rgb:142,45,191;
    /* 생각 라인·변신 직업군 — 터콰이즈(운영자 260707 "더콰이즈" · 단일 톤 = --think — 생각줄 저투명 + 변신 배지 공용) */
    --think:#3EE0C8; --think-rgb:62,224,200;
    /* 카드 정보줄 간격 기준(운영자 260707 비율 5:5:3.5 — 등급↔이름·이름↔생각 = --lgap · 생각↔최근말 = calc(--lgap*.7) · 전 레포 공통) */
    --lgap:6px;
    /* 글래스모피즘 — 프로스티드 표면·엣지 하이라이트(구성도 표면3단 계승·260704) */
    --glass:rgba(255,255,255,.005); --glass-2:rgba(255,255,255,0); --glass-line:rgba(255,255,255,.08);   /* 운영자 260707 글래스 플그 확정(초투명·강블러 카드) */
    --glass-0:rgba(255,255,255,.002); --glass-line-0:rgba(255,255,255,.066);   /* 0 = 가장 옅은 단 — 확정값 비례 환산(.02/.055·.115/.14 비율 유지) */
    /* 그림자·배경 스크림(절대1: raw 금지→토큰 · 260704) */
    --shadow-card:0 24px 60px rgba(0,0,0,.42); --bg-scrim:linear-gradient(transparent 44%,rgba(0,0,0,.5) 76%,rgba(0,0,0,.85));
    /* 의미색 */
    --danger:#ff5b4a; --danger-rgb:255,91,74; --arm:#ffd93d;
    /* yeta 챗 — 내 버블=브랜드 라임(보라 폐지·전체 그린 통일 260704) · 캐릭터 버블=근흑 · 창=스포티파이 블랙 */
    --bubble-me:var(--accent); --bubble-ai:#1e2023; --yeta-bg:var(--bg);   /* 챗창 = 스포티파이 블랙 통일(--bg) · 글래스 엣지로 분리(운영자 260704) */
    /* 반지름 */
    --r-s:9px; --r-m:11px; --r-l:16px; --r-modal:22px; --r-pill:999px;
    /* 간격·버튼 */
    --sp-2:12px; --sp-3:18px; --btn:34px;
    /* 타이포 */
    --fs-h2:15px; --fs-h3:14px; --fs-body:15px; --fs-label:13px; --fs-sm:12px; --fs-xs:11px;
    --fw-x:800; --fw-b:700; --lh-base:1.6;
    /* 모션 */
    --ease:cubic-bezier(.2,.7,.3,1);
    /* 글래스 blur(구조토큰 — tokens.css 거울) */
    --blur-m:29px; --blur-l:11px;   /* 운영자 260707 글래스 플그 확정(카드 강블러·모달 약블러) */
    /* z (dialog=top-layer라 nm-toast만) */
    --z-float:60;
    /* 눌림 scale 사다리 */
    --press-m:.9; --press-l:.95; --press-s:.9;
    /* PIN·핀 액티브 = 브랜드 라임(옛 라이트/코발트 팔레트 폐지 → 다크·그린 통일 260704) */
    --pin-ac:var(--accent); --pin-ac-rgb:var(--accent-rgb);
  }
  /* reduced-motion = 눌림 토큰 전역 무효화(1) — 개별 transform:none 가드 대신 한 블록(분신술10·4뷰어 가드 불균형 해소) */
  @media (prefers-reduced-motion:reduce){ :root{ --press-m:1; --press-l:1; } }
/* ── body 기본(독립 뷰어) ── */
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }   /* 탭 하이라이트 전역 봉합 — 개별 선언 누락(22곳 중 15곳)이 안드로이드에서 사각 잔상으로 비치던 것(운영자 260706 자물쇠 스샷 · call.js 주입분 포함 일괄) */
html,body { margin:0; height:100%; }
/* 글래스 스크롤바(운영자 260707 항목1) — 전 스크롤 표면 공통: 트랙 투명·썸 = 유리 알약(글래스 사다리 계승) · Firefox = thin+색만(세부 스타일 미지원 축) */
* { scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.14) transparent; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--glass-2); border:1px solid var(--glass-line); border-radius:var(--r-pill); }
::-webkit-scrollbar-thumb:hover { background:var(--glass-line); }
::-webkit-scrollbar-corner { background:transparent; }
body { background:var(--yeta-bg,#121212); color:var(--fg); font-family:var(--app-font, Pretendard,-apple-system,system-ui,sans-serif); -webkit-font-smoothing:antialiased; overscroll-behavior:none; }   /* --app-font = 설정 폰트 선택(영문/한글 · yFontApply가 html에 주입 · 기본 = Pretendard 스택 · 운영자 260707) */
::selection { background:var(--cobalt); color:var(--fg); }   /* 2차 강조 코발트 — 텍스트 선택(브랜드 통일 260704) */
/* ── 공통 컴포넌트(계승): nm-toast · msgUnfold · dialog · tool-x · gdots ── */
  .nm-toast { position:fixed; left:0; right:0; margin-inline:auto; bottom:calc(86px + env(safe-area-inset-bottom)); transform:translateY(18px);
    z-index:var(--z-float); width:min(92vw,430px); display:flex; align-items:center; gap:9px; padding:11px 15px; cursor:pointer;
    background:linear-gradient(135deg, rgba(42,13,11,.86), rgba(20,9,9,.86)); border:1px solid rgba(255,85,60,.5); border-radius:14px;
    box-shadow:0 12px 34px rgba(0,0,0,.5), 0 0 16px rgba(255,60,50,.22); color:#fff; font-size:13px; font-weight:700; line-height:1.35;
    backdrop-filter:blur(18px) saturate(1); -webkit-backdrop-filter:blur(18px) saturate(1); opacity:0; transition:opacity .3s, transform .3s; }   /* 글래스모피즘 = 배경 반투명(.95→.86 뒤 비침)+blur 14→18(운영자 260702) · 위치 78→86px 약간 위 */
  .nm-toast.show { opacity:1; transform:translateY(0); }
  .nm-toast .tg { flex:none; font-size:10.5px; font-weight:800; color:#fff; background:linear-gradient(135deg,#ff3b3b,#ff7a2f); border-radius:999px; padding:2px 8px; box-shadow:0 0 8px rgba(255,60,50,.5); }
  .nm-toast b { color:#ffd9cf; }
  .nm-toast .ft-msg { flex:1; min-width:0; }   /* 본문이 남는 폭 채움 → ✓·↻ 버튼 우측 정렬(운영자 260622) */
  .nm-toast .ft-act { flex:none; width:28px; height:28px; }   /* ✓확인·↻재시도·↗이동 = 28px(게이지 버튼 .sc-got/.unmerge-go 계승 높이) → 하단 토스트 액션 버튼 높이 정렬(운영자 260702). .sbtn 기틀(눌림 scale·.ok 플래시·ic-spin) 계승 */
  .nm-toast .ft-act svg { width:14px; height:14px; }   /* Q_ARR(원문·크기 미지정)·CHECK 아이콘 크기 통일 = 14(토스트 기존 유지) */
  @keyframes msgUnfold { from { opacity:0; transform:scale(.82) translateY(-8px); } to { opacity:1; transform:none; } }
  dialog {
    width:min(820px,94vw); max-height:88vh; color:var(--fg); padding:0;
    background:linear-gradient(165deg, rgba(27,44,32,.60), rgba(11,19,14,.70));
    backdrop-filter:blur(30px) saturate(1); -webkit-backdrop-filter:blur(30px) saturate(1);
    border:1px solid rgba(255,255,255,.13); border-radius:var(--r-modal);   /* 전 모달 22 통일(#dlg만 26이던 것) */
    box-shadow:0 30px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14);
  }
  dialog::backdrop { background:rgba(4,8,5,.46); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); }
  .tool-x { width:30px; height:30px; flex:none; display:grid; place-items:center; background:rgba(255,255,255,.06);
    color:var(--fg); border:1px solid var(--line); border-radius:9px; cursor:pointer; }
  .tool-x:hover { color:var(--accent); border-color:rgba(var(--accent-rgb),.4); }
  .tool-x:focus-visible { outline:none; box-shadow:0 0 0 2px rgba(var(--accent-rgb),.5); }   /* 키보드 포커스 링 */
  .tool-x, .dlg-x, .mx, .ed-x, .askx, .qh-x, .fb-x, .sc-rsn-x, .askimg-x, .pin-x { transition:transform .3s var(--ease); }
  .tool-x:active, .dlg-x:active, .mx:active, .ed-x:active, .askx:active, .qh-x:active, .fb-x:active, .sc-rsn-x:active, .askimg-x:active, .pin-x:active { transform:rotate(180deg) scale(var(--press-m,.92)); }
  .gdots { display:inline-block; width:1.1em; text-align:left; }
  .gdots i { font-style:normal; opacity:0; animation:gdots 1.4s infinite; }
  .gdots i:nth-child(2) { animation-delay:.22s; } .gdots i:nth-child(3) { animation-delay:.44s; }
  @keyframes gdots { 0% { opacity:0; } 25%,70% { opacity:1; } 95%,100% { opacity:0; } }
  .yscramble { display:inline-block; font-family:ui-monospace,SFMono-Regular,Menlo,'Cascadia Code',Consolas,monospace; font-weight:var(--fw-b); font-size:var(--fs-body); letter-spacing:.24em; color:var(--accent); text-shadow:0 0 9px rgba(var(--accent-rgb),.4); }   /* 스크램블 로더 글리프(beui.dev 차용 · 진행중 · 라임 네온 = 메타버스 결 · 운영자 260708) — 모노스페이스 = 글리프 폭 고정(레이아웃 저크 0) · text-shadow = 토큰 없는 축 */
  .yeta-setup.yload { text-align:center; }   /* 스크램블 로더 = 가로 중앙(픽토그램 로더 결 · 에러/빈상태 텍스트는 좌측 유지) */
  .yboot { position:fixed; inset:0; z-index:999; display:grid; place-items:center; background:var(--yeta-bg,#121212); animation:ybootOut .55s var(--ease) 1.5s forwards; }   /* 첫 열기 부팅 스플래시 = 1.5s(스크램블 1사이클 resolve) 후 페이드 · CSS 애니 = JS 실패해도 반드시 걷힘(블로킹 방지) · z=로컬(raw 예외) */
  .yboot-w { font-size:clamp(26px,7.5vw,46px); letter-spacing:.3em; }
  @keyframes ybootOut { to { opacity:0; visibility:hidden; } }
  @media (prefers-reduced-motion:reduce) { .yboot { animation-delay:.8s; } }
/* ── yeta 전용 CSS(L309-405) ── */
  /* ── yeta 말벗 제타(#yetadlg · 260703 v2 제타결) — 랜덤 페르소나 톡방. 다크 창(--yeta-bg) + 캐릭터 버블(--bubble-ai·아바타+이름) + 내 버블 제타 보라(--bubble-me) + *나레이션* 이탤릭. 페르소나 색 = --yeta-ac(JS가 roster color 주입 = "캐릭터 따라 톤" 운영자 컨셉) ── */
  /* 챗 = 풀스크린 글래스모피즘(운영자 260705 "팝업 아닌 화면 전체 + 딱 저 글래스 느낌"). base = 스포티파이 블랙 솔리드(--bg) · 유일 배경 = .ybg 씬 레이어(캐릭터 시그니처→장소). 초록 계단 포스터(yeta-bg.webp)는 대화창에서 폐기(운영자 260707 "계단 오버레이 폐기 — 대화창 한정") = 로드 틈 비침·오버레이 0. 표면(헤더·버블·입력·인트로)은 글래스로 .ybg 씬이 비쳐 글래스모피즘 성립. */
  #yetadlg { width:100vw; height:100dvh; max-width:100vw; max-height:100dvh; margin:0; padding:0; border:none; border-radius:0; box-shadow:none;
    background:var(--bg); color:var(--fg); overflow:hidden; --yeta-ac:var(--bubble-me);   /* 챗 base = 스포티파이 블랙 솔리드(계단 포스터 폐기 260707) · 실제 배경 = .ybg(#ybgA/B) 씬 레이어 · .ybg 자체 스크림(yPaintBg .72~.86)이 가독 담당 */
    backdrop-filter:none; -webkit-backdrop-filter:none; }   /* 풀스크린 배경 이미지 = 글래스 표면이 비칠 base(불투명 --yeta-bg 폐지) */
  #yetadlg::backdrop { background:rgba(0,0,0,.6); }
  /* 챗 진입 촤르륵(운영자 260706 "메뉴2→3 넘어가는 게 어색 → 자연스럽게 촤르륵 나오게") — showModal 즉발 팝 제거. 원샷 .ydlg-in(openYeta가 열 때만 부여·내부 뷰 토글 재트리거 방지) = 창·배경 페이드 → 헤더·무대·입력 계단 부상(ypickIn/ynavRise 결 계승·--ease). reduce=즉시. */
  @keyframes ydlgIn { from { opacity:0; } }
  @keyframes ydlgBd { from { opacity:0; } }
  @keyframes ydlgUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

  /* ═══ YETA 메인 화면 (다크·PIN 게이트 · 260704 브랜드 통일 — 스포티파이 블랙+라임 글래스) ═══ */
  body { background:
      radial-gradient(circle at 50% 40%, rgba(var(--accent-rgb),.08), transparent 34%),
      radial-gradient(circle at 12% 90%, rgba(var(--cobalt-rgb),.10), transparent 36%),
      var(--bg); color:var(--fg); }
  /* step1 로그인창 = 살아있는 레이어 스택(운영자 260705 픽 이식 — 정적 포스터 폐지 · 소년 컷아웃 + CSS 원/밴드 + 효과 4종) */
  .ymain { position:fixed; inset:0; display:flex; flex-direction:column; z-index:1; background:var(--bg); overflow:hidden; }
  .ymain.unlocked { background:radial-gradient(circle at 62% 30%, rgba(var(--accent-rgb),.14), transparent 52%), radial-gradient(circle at 12% 90%, rgba(var(--cobalt-rgb),.03), transparent 42%), var(--bg); }   /* 언락 후 배경 = 배경 영상(.ybgvid) · 앰비언트 = 라임 .14 + 코발트 .03(언락 밝기 플그 운영자 확정) · 포스터 = PIN 잠금 화면 전용 */
  /* ═══ 언락 배경 영상(운영자 260706 "계단 대신 이 영상 · 앞이 잘 보이게 적당히 검정 처리 + 그 위에 글래스") — CSS 3D 계단(.ystair) 대체.
     스크림 = ::after 균일 검정 + 기존 탭 ::before 그라데 딤(언락 밝기 플그 확정값) 병행 · 글래스 카드(--glass-0)가 그 위 = 자연스러운 글래스모피즘. ys-hold 계약 승계(챗 열림 = 정지·숨김). */
  .ybgvid { display:none; position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .ymain.unlocked .ybgvid { display:block; }
  .ymain.unlocked .ybgvid.ys-hold { display:none; }   /* 챗(dialog) 열림 중 영상 정지+숨김(GPU 절약 · 계단 pause 계약 승계) */
  .ybgvid video { width:100%; height:100%; object-fit:cover; object-position:center; }
  .ybgvid::before { content:''; position:absolute; inset:0; background:rgba(18,18,18,.2); }   /* 배경 영상 바로 위 = 스포티파이 블랙 20% 균일 틴트(운영자 "맨 뒤 배경 바로 위 20% 레이어") — 배경 텍스처 가라앉혀 앱 스포티파이 블랙 통일·옅은 글래스(설정 등) 구분감 확보 · ::after 검정 처리와 병행(전 탭 공유) */
  .ybgvid::after { content:''; position:absolute; inset:0; background:rgba(18,18,18,.38); }   /* 적당한 검정 처리(--bg 계열 38%) — 위 글래스·텍스트 가독 확보하되 영상은 살림 · 탭 딤과 병행 */
  /* PIN 모드 전면 글래스 딤 — 포스터 타이포(PLAY a Episode/YETA) 위에 PIN 라벨·슬롯이 겹쳐 뒤죽박죽 되던 것 차단(운영자 스샷 260704).
     딤 값 = dialog ::backdrop 동값 계승 · blur = --blur-m · z = 로컬(절대1 예외축) */
  /* PIN 모드 딤 = 이미지를 덮지 않음(운영자 260705 "기존 이미지 안 덮고") — 풀블러 폐지, 키패드 있는 하단만 은은한 그라데 스크림(가독). 얼굴·헤드라인은 그대로 노출. */
  .ymain::before { content:''; position:absolute; inset:0; z-index:1; background:linear-gradient(transparent 44%, rgba(0,0,0,0) 86%); pointer-events:none; transition:background .5s var(--ease); }
  .ymain.pin-mode::before { background:none; }   /* 추가 딤 폐지 — 균일 오버레이(.ym-ovl 67%)가 대체(운영자 260706 확정) */
  .ym-ovl { position:absolute; inset:0; z-index:1; background:rgba(18,18,18,.67); pointer-events:none; transition:opacity 1.15s var(--ease); }   /* 페이드 1.15s(잠금 안무 플그 운영자 확정) */   /* 잠금 오버레이 = 스포티파이 블랙 67%(운영자 260706 플그 확정) · 언락 = 페이드 퇴장 */
  .ymain.unlocked .ym-ovl { opacity:0; }
  /* ⑤ PIN 웜업(운영자 260706 메타버스 서사·플그 v4) — 로고 꽂히는 순간(strike)부터 딤이 1.4s 램프로 걷혀 원본 포스터(main_v2) 명료도 노출("레포 배경만큼 또렷하게") · 딤 잔량 0 */
  .ymain.strike .ym-ovl { opacity:0; transition:opacity .8s var(--ease); }   /* 차오름 .8s(운영자 확정) */
  .ym-zap { position:absolute; inset:0; z-index:6; pointer-events:none; display:none; }
  .ymain.zap .ym-zap { display:block; }
  .ym-zap i { position:absolute; inset:0; mix-blend-mode:screen; }
  .ymain.zap .ym-zap i:first-child { background:rgba(var(--accent-rgb),.22); animation:ymZapA .25s steps(1) both; }   /* .25s(잠금 안무 플그 운영자 확정) */
  .ymain.zap .ym-zap i:last-child { background:rgba(var(--cobalt-rgb),.28); animation:ymZapB .25s steps(1) both; }
  @keyframes ymZapA { 0% { clip-path:inset(8% 0 66% 0); transform:translateX(-9px); } 25% { clip-path:inset(58% 0 12% 0); transform:translateX(7px) skewX(-5deg); } 55% { clip-path:inset(30% 0 40% 0); transform:translateX(-5px); } 80%,100% { clip-path:inset(0 0 100% 0); transform:none; } }
  @keyframes ymZapB { 0% { clip-path:inset(50% 0 20% 0); transform:translateX(9px); } 30% { clip-path:inset(10% 0 70% 0); transform:translateX(-8px) skewX(4deg); } 60% { clip-path:inset(70% 0 6% 0); transform:translateX(5px); } 85%,100% { clip-path:inset(100% 0 0 0); transform:none; } }
  .ymain-body { flex:1; display:flex; flex-direction:column; align-items:center; overflow:hidden; padding:0 24px; position:relative; z-index:2; }
  /* PIN 블록은 절대배치(배 위치)로 오버랩 — body 정렬 불필요(옛 center 규칙 폐지) */
  /* ═══ 잠금 화면 = 기본 메인 포스터(구성도/소스이미지/main_v2) 좌표계 재현(운영자 260706 "기본 메인 이미지 그 위치에 효과 그대로") ═══
     스테이지 = 9:16 포스터 프레임 하단 정렬 · 기하 = main_v2 실측 %{원 중심 (48.8,69.5)·코어 지름 74.3%W · 밴드 rect (25.7,33.1,43.8x6.43) -6.2° · 로고 폭 63.66%W 상단 19.7%} · 효과 4종(글리치 RGB·VHS 지터·홀로 플리커·글로우 펄스) 계승 · 픽 값 = 로컬 변수 · 키프레임 안무·기하 = 절대1 예외축
     진입 안무(운영자 260706): 소년 촤르륵 인 → 라벨 쏵 스윕인 → [잠금 터치] 라벨 각도 유지 퇴장+줌 복귀(.go) → 로고 번개 스트라이크(.strike) → 사람 효과 정지·원 디밍만(.calm)+PIN 부상 → PIN 통과 = 라벨 재스윕(.bye) → 캐릭터 메뉴 */
  .ym-stage { position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:100%; width:max(100%, calc(100dvh * 9 / 16)); aspect-ratio:9/16; z-index:0; pointer-events:none; transform-origin:50% 42%;
    --st-glowop:1; --st-amp:1; }   /* amp 2→1 = 상시 효과(홀로·VHS·글리치·펄스) 느긋하게(잠금 안무 플그 운영자 확정) */   /* 롱폰(9:20~22) = 세로 꽉 채움·가운데 정렬·좌우 크롭(운영자 260706 "위 화면 안 씀") — 내부 % 좌표계 불변(박스만 확대) · 구형 dvh 미지원 = 100% 폴백 */
  /* ═══ 영상 히어로 잠금(운영자 260706 교체) — 영상 베이스 + 처음 스포티파이 블랙 스크림(.ym-ovl) 흐림 → 잠금 터치 시 스크림 걷혀 원본 선명 → 그 위에 PIN · 로고 내리치기·다이브·zap·크랙 유지 · 라벨(밴드) 제거 ═══ */
  .ym-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
  .ymain.video-lock .ym-video { display:block; }
  /* 로고 스타일(운영자 260707 플그 선택값) — 블러·라임 글로우·헤일로 소등, 불투명도 .7→.92(또렷), 내부 광원 .75 점등 · filter opacity()는 flicker 애니 opacity와 곱 = 애니 안 깨고 감쇠 · 스캔라인 = 선택 1 = 실물 기존 강도 그대로(플그 재현이 .5로 약했던 것) */
  .ymain.video-lock .ym-stage .ym-wm { top:31%; filter:opacity(.92); }   /* 위치 19.7→31%(얼굴/눈 벗어나 가슴께로 · 운영자 260706 "낮춰서") */
  .ymain.video-lock .ym-stage .ym-wm .w-halo { display:none; }   /* 헤일로 0(선택값) — 좌상단 #ywm 헤일로는 유지 */
  .ymain.video-lock .ym-stage .ym-wm .w-light { opacity:1; }   /* 내부 광원 점등 = 잠금 대형 로고 한정 */
  /* 배경 화려 → 로고 전격 자주(운영자 260706): 정지 상태 flicker 4s→1.8s · 지지직 버스트 5.6s→3.2s (video-lock 한정 승격) */

  .ymain.go .ym-stage { animation:ymZoom .45s var(--ease) both; }   /* 줌했다가 정면 복귀(.45s · 잠금 안무 플그 운영자 확정) */
  @keyframes ymZoom { 0% { transform:translateX(-50%) scale(1); } 45% { transform:translateX(-50%) scale(1.11); } 100% { transform:translateX(-50%) scale(1); } }
  /* 잠금 화면 대형 YETA 로고 — 확정 워드마크(#ywm 6겹) 재사용 · 포스터 YETA 위치(폭 63.66% · 상단 19.7% · 머리카락 뒤 z) · 번개 스트라이크 등장
     ⚠ 셀렉터 = .ym-stage .ym-wm 특이도 승격(베이스 .ywm이 소스 뒤라 단일 클래스는 패배 — 실측 260706) */
  .ym-stage .ym-wm { display:none; top:19.7%; left:50%; right:auto; z-index:4; --w:63.66%; width:var(--w); transform:translateX(-50%); animation:none; }   /* z-index:4 = 소년(.ymb z-auto) 앞 — 로고가 머리 앞으로(운영자 260706 · 옛 포스터 층위[머리카락이 로고 가림] 폐지) · --w=%라 내부 오프셋 calc는 자기폭 비례 = 대형 로고 스케일링(평의회1 F3) */
  .ymain.strike .ym-stage .ym-wm { display:block; animation:ymStrike .92s cubic-bezier(.22,.61,.36,1) both, ywmFlick 4s steps(1) .6s infinite; }   /* 스트라이크 .92s(잠금 안무 플그 운영자 확정 — 높이 220%에서 그윽한 낙하) */
  @keyframes ymStrike { 0% { opacity:0; transform:translateX(-50%) translateY(-220%) scale(1.45); } 34% { opacity:1; } 55% { transform:translateX(-50%) translateY(1.6%) scale(.985); } 74% { transform:translateX(-50%) translateY(-.8%) scale(1.006); } 100% { opacity:1; transform:translateX(-50%); } }
  .ym-flash { position:absolute; inset:0; opacity:0; background:radial-gradient(circle at 50% 24%, rgba(255,255,255,.85), rgba(var(--accent-rgb),.22) 42%, transparent 68%); }   /* 번개 플래시(전뇌 엣지) */
  .ymain.strike .ym-flash { animation:ymFlash .38s linear .24s both; }
  @keyframes ymFlash { 0% { opacity:0; } 28% { opacity:1; } 42% { opacity:.25; } 55% { opacity:.6; } 100% { opacity:0; } }
  /* ④ 언락 라이트업 — 승인(bye) 60ms 뒤 스테이지 발광 1.35x가 .15s 스냅으로 차오른 뒤 전환(zap 지지직과 병행 = 메타버스 진입 · 운영자 확정) */
  /* 승인 다이브(운영자 260706 "메타버스 로그인") — 타격 스파이크(12% 지점 발광 1.45) 후 캐릭터 눈 방향(48.8%,36%)으로 이징 줌 인하며 어둠 속으로 · zap(VHS)은 500ms 시점 병행 · 소스 위치 = .go ymZoom 규칙 뒤(캐스케이드 승리) */
  .ymain.bye .ym-stage { transform-origin:48.8% 36%; animation:ymDive 1s var(--ease) both; }
  @keyframes ymDive { 0% { transform:translateX(-50%) scale(1); filter:brightness(1); } 12% { filter:brightness(1.45); }
    100% { transform:translateX(-50%) scale(1.9); filter:brightness(.12); } }
  /* 매트릭스 형상(운영자 260706 "들어가면서 사람 안 형상을 매트릭스로") — 승인 시 캐릭터 실루엣에만 초록 코드 레인(canvas, destination-in 마스크) · 스테이지와 별도 레이어라 다이브 어둠(brightness .12)에 안 먹혀 코드가 발광 · 눈 방향 동기 줌 · mix-blend screen */
  .ym-matrix { position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:100%; width:max(100%, calc(100dvh * 9 / 16)); aspect-ratio:9/16; z-index:3; pointer-events:none; opacity:0; mix-blend-mode:screen; transform-origin:48.8% 36%; }   /* 영상 히어로 = 풀프레임 코드(소년 실루엣 마스크 폐지 · 다이브 시 전체 디지털화) */
  .ymain.bye .ym-matrix { animation:ymMatrixDive 1s var(--ease) both; }
  @keyframes ymMatrixDive { 0% { opacity:0; transform:translateX(-50%) scale(1); } 22% { opacity:1; } 100% { opacity:.92; transform:translateX(-50%) scale(1.9); } }
  .ymain.unlocked .ym-matrix { display:none; }
  @media (prefers-reduced-motion:reduce){ .ym-matrix { display:none !important; } }
  /* 로고 착지 후 = calm 상태에서 로고만 주기적 지지직 VHS 버스트(소년 착지반동·글리치 버스트는 폐지) */
  .ymain.calm.strike .ym-stage .ym-wm { animation:ywmFlick 4s steps(1) infinite, ymBurstWm 5.6s linear infinite; }
  /* PIN 승인 = 로고 전격 1회 즉발(ymBurstWm 93~97% 창 압축 · 운영자 260706 "로고 전격 한번 싹") */
  .ymain.bye.calm.strike .ym-stage .ym-wm { animation:ywmFlick 4s steps(1) infinite, ymLogoZap .5s linear both; }
  @keyframes ymLogoZap { 0%,100% { transform:translateX(-50%); } 18% { transform:translateX(-50%) translate(-8px,2px) skewX(-1.4deg); } 36% { transform:translateX(-50%) translate(6px,-2px); } 55% { transform:translateX(-50%) translate(-3px,1px) skewX(.7deg); } 72% { transform:translateX(-50%); } }
  @keyframes ymBurstWm { 0%,93.4%,100% { transform:translateX(-50%); } 94% { transform:translateX(-50%) translate(-8px,2px) skewX(-1.4deg); } 95.2% { transform:translateX(-50%) translate(6px,-2px); } 96.4% { transform:translateX(-50%) translate(-3px,1px) skewX(.7deg); } 97.6% { transform:translateX(-50%); } }
  .ym-stage::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, transparent 1px 3px); }   /* VHS 스캔라인 */
  .ymain.unlocked .ym-stage { display:none; }   /* 스택 = 잠금 화면 전용(언락 후 탭 화면과 무관 · 대형 로고 포함) */
  /* 앵커 프레임 = 스테이지와 동일 9:16 좌표계(하단 정렬) — 접속 자물쇠·PIN이 화면비 무관하게 소년 몸통에 정확히 붙는다(옛 .ym-hero flex 폐지 260706) */
  .ym-fit { position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:100%; width:max(100%, calc(100dvh * 9 / 16)); aspect-ratio:9/16; z-index:2; pointer-events:none; }   /* .ym-stage 동일 박스 공식 유지 = PIN·자물쇠 몸통 유착(17차 계약) */
  .ym-access { width:72px; height:72px; border-radius:50%; border:1px solid var(--glass-line); cursor:pointer; display:grid; place-items:center;
    background:var(--glass-2); backdrop-filter:blur(var(--blur-l)) saturate(1); -webkit-backdrop-filter:blur(var(--blur-l)) saturate(1);
    color:var(--accent); box-shadow:inset 0 1px 0 var(--glass-line), var(--shadow-card), 0 0 26px rgba(var(--accent-rgb),.16);
    transition:transform .28s var(--ease), box-shadow .3s var(--ease), border-color .3s var(--ease); touch-action:manipulation; }
  .ym-access:active { transform:scale(var(--press-m)); }
  .ym-access svg { width:24px; height:24px; }
  /* 텍스트 라벨 대신 자물쇠가 숨쉬듯 커졌다 작아지며(작을 때 약하게 디밍) "눌러" 신호 = 접속 어포던스(운영자 260705) · 등장 페이드는 아래 .ym-access-card 블록 */
  @keyframes ymLockBreathe { 0%,100% { transform:scale(.96); opacity:.78; } 50% { transform:scale(1.12); opacity:1; } }   /* 최대 1.12(잠금 안무 플그 운영자 확정) */
  .ym-access.unlocking { animation:ymLockIgnite .5s var(--ease) both; opacity:1; }   /* 누르면 숨쉬기 → 점화 원샷: 현재 숨쉬기 프레임(--ig-s/--ig-o = JS 주입)에서 그대로 이어받아 살짝 눌림 → 팍 발광 → 확정 글로우(40px .42) 안착. animation:none 즉살 때 중간 프레임 스냅(최대 scale .12·opacity .22 툭 튐) 제거 — 운영자 확정 안무(260/280/790·31°·숨쉬기 파라미터)는 불변 */
  @keyframes ymLockIgnite {   /* 키프레임 안무 % · 발광 box-shadow = 토큰 없는 축(raw 예외) · 색은 --accent-rgb 계승 */
    0% { transform:scale(var(--ig-s,1.02)); opacity:var(--ig-o,.9); box-shadow:inset 0 1px 0 var(--glass-line), var(--shadow-card), 0 0 26px rgba(var(--accent-rgb),.16); filter:brightness(1); }
    28% { transform:scale(.93); }
    58% { transform:scale(1.07); opacity:1; box-shadow:inset 0 1px 0 var(--glass-line), var(--shadow-card), 0 0 62px rgba(var(--accent-rgb),.8), 0 0 20px rgba(var(--accent-rgb),.5); filter:brightness(1.4); }
    100% { transform:scale(1); opacity:1; box-shadow:inset 0 1px 0 var(--glass-line), var(--shadow-card), 0 0 40px rgba(var(--accent-rgb),.42); filter:brightness(1); }
  }
  /* 접속 누름 = 잠금해제 액티브 — 고리가 힌지 축으로 들려 열리고 라임 글로우 점등(운영자 260704 "락이 풀리는 모션") · 고리 회전=기하 raw 예외축 */
  .ym-shackle { transform-box:fill-box; transform-origin:86% 100%; transition:transform .5s var(--ease); }
  .ym-access.unlocking .ym-shackle { transform:translateY(-2px) rotate(-31deg); }   /* 31°(잠금 안무 플그 운영자 확정) */
  .ym-access.unlocking { color:var(--accent); border-color:rgba(var(--accent-rgb),.55);
    box-shadow:inset 0 1px 0 var(--glass-line), var(--shadow-card), 0 0 40px rgba(var(--accent-rgb),.42); }
  /* 접속 = 캐릭터 가슴팍 위 글래스 잠금해제 버튼(무채색 글래스 + 강조 라임 디밍 · 운영자 260704) · 누르면 진입 시퀀스(.go→.strike→.calm+pin-mode) · 위치 = 포스터 가슴(60% · 9:16 앵커) */
  .ym-access-card { position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); pointer-events:auto;
    display:flex; flex-direction:column; align-items:center; gap:10px; transition:opacity .4s var(--ease), visibility 0s .4s; }   /* visibility 지연 = 페이드 끝난 뒤 포커스 트리서 제거 */
  .ym-access { animation:ymFadeIn .4s var(--ease) 1.1s both, ymLockBreathe 1.9s var(--ease) 1.5s infinite; }   /* 라벨 스윕 후 등장(1.1s) → 숨쉬기 1.9s(잠금 안무 플그 운영자 확정) */
  @keyframes ymFadeIn { from { opacity:0; } to { opacity:.78; } }
  .ymain.pin-mode .ym-access-card { top:40%; pointer-events:none; transition:top .5s var(--ease), opacity .4s var(--ease); }   /* 자물쇠 잔류(운영자 260706 해킹 서사) — 핀 블록 63% 상향에 맞춰 47.5→40%(패턴 첫 행 가림 해소) */
  /* PIN 블록 = 캐릭터 '배' 높이(≈66%)에 이미지 오버랩 절대배치 · 접속 후 아래에서 위로 올라오며 페이드인(운영자 260705) */
  .ym-pin { position:absolute; left:50%; top:63%; z-index:3; width:100%; max-width:300px; display:flex; flex-direction:column; align-items:center;   /* 71.5→63% 상향 — 번호 슬롯 폐지로 아래 처짐 교정(운영자 260707 "더 위로") */
    opacity:0; visibility:hidden; transform:translate(-50%, calc(-50% + 94px)); pointer-events:none;
    transition:opacity .4s var(--ease) .12s, transform .4s var(--ease) .12s, visibility 0s .52s; }   /* 부상 .4s·거리 94px(잠금 안무 플그 운영자 확정) */   /* visibility = 비활성 시 탭 순서·AT에서 제거(비가시 조작가능 창 차단 · 평의회8) */
  /* PIN 단계 자물쇠 = 눌러 진입하면 사라짐(운영자 260707 — 260706 '잔류·해킹 서사' 폐지 · 페이드아웃) */
  .ymain.pin-mode .ym-access { opacity:0; visibility:hidden; pointer-events:none; animation:none; width:46px; height:46px;
    transition:width .5s var(--ease), height .5s var(--ease), transform .25s var(--ease), filter .25s var(--ease), opacity .4s var(--ease), box-shadow .3s var(--ease); }
  .ymain.pin-mode .ym-access svg { width:19px; height:19px; transition:width .5s var(--ease), height .5s var(--ease); }
  .ym-access[data-crack="1"] { transform:skewX(-3deg) rotate(-1.5deg) scale(.97); filter:brightness(1.12); }
  .ym-access[data-crack="2"] { transform:skewX(4deg) rotate(2deg) scale(.94); filter:brightness(1.22) contrast(1.08); }
  .ym-access[data-crack="3"] { transform:skewX(-6deg) rotate(-3.5deg) scale(.9); filter:brightness(1.35) contrast(1.15); }
  .ym-access[data-crack="4"] { animation:ymLockBreak .5s var(--ease) both; }   /* 4개째 = 박살(타격과 동시) */
  @keyframes ymLockBreak { 30% { transform:scale(1.3) rotate(7deg); filter:brightness(2.2); opacity:1; } 100% { transform:scale(.25) rotate(-30deg); filter:brightness(3); opacity:0; } }
  .ym-access.hitc { animation:ymLockGlitch .2s steps(2) 1; }   /* 입력·오류 순간 지지직(전뇌 결) */
  .ym-access[data-crack="4"].hitc { animation:ymLockBreak .5s var(--ease) both; }   /* 박살이 지지직에 안 덮이게 */
  @keyframes ymLockGlitch { 0% { transform:translate(-3px,1px) skewX(-6deg); } 50% { transform:translate(3px,-1px) skewX(5deg); } 100% { transform:none; } }
  .ymain.pin-mode .ym-pin { opacity:1; visibility:visible; transform:translate(-50%,-50%); pointer-events:auto;
    transition:opacity .4s var(--ease) .12s, transform .4s var(--ease) .12s, visibility 0s; }
  /* PIN 키패드 = nomute lk- 이식 · 다크+라임 리컬러(260704) */
  /* 'PIN 입력' 텍스트 라벨 폐지(운영자 260706 — aria-label 대체) · 핀칸 = 스포티파이 블랙 10% 알약 스크림으로 감싸기(첨부 nomute 결) */
  .lk-slots { display:none; justify-content:center; gap:15px; margin:22px 0 2px; padding:13px 26px; background:rgba(18,18,18,.1); border-radius:var(--r-pill); }   /* 4자리 음영칸 = 패턴(지그재그) 전환으로 잉여 → 숨김(운영자 260707 · 진행표시는 패턴 자체) */
  .lk-slot { width:18px; height:20px; display:grid; place-items:center; font:800 20px/1 Pretendard,sans-serif; color:var(--pin-ac); opacity:.5; transition:opacity .15s, transform .15s; }
  .lk-slot::before { content:''; grid-area:1/1; width:13px; height:13px; box-sizing:border-box; border-radius:50%; border:2px solid var(--mut); transition:border-color .15s, background .15s; }
  .lk-slot.on { opacity:1; }
  /* 입력한 것만 = 채워진 라임 원(OS 잠금 결) · 숫자 노출 폐지(운영자 260706 "그때그때 보이니까" — 잔존 문제 원천 제거) */
  .lk-slot.on::before { content:''; border:none; background:var(--pin-ac); }
  .lk-slot.pop { animation:lkPop .3s cubic-bezier(.22,.61,.36,1); }   /* 입력 순간 통통(촤르륵 커브 계승) */
  @keyframes lkPop { 0% { transform:scale(.5); } 60% { transform:scale(1.3); } 100% { transform:scale(1); } }
  /* 승인 = 4원 순차 라임 파동(왼→오 한 바퀴 · 운영자 260706) */
  .lk-slots.ok .lk-slot { opacity:1; animation:lkOkWave .32s var(--ease) both; }
  .lk-slots.ok .lk-slot:nth-child(2) { animation-delay:.08s; } .lk-slots.ok .lk-slot:nth-child(3) { animation-delay:.16s; } .lk-slots.ok .lk-slot:nth-child(4) { animation-delay:.24s; }
  .lk-slots.ok .lk-slot::before { content:''; width:13px; height:13px; border:none; border-radius:50%; background:var(--pin-ac); }
  @keyframes lkOkWave { 40% { transform:scale(1.35); filter:drop-shadow(0 0 8px rgba(var(--accent-rgb),.8)); } }
  .lk-slots.bad .lk-slot::before { border-color:var(--danger); }
  .lk-slots.bad .lk-slot.on::before { background:var(--danger); color:var(--danger); }
  @keyframes lkShake { 0%,100%{transform:translateX(0)} 12%{transform:translateX(-9px)} 28%{transform:translateX(8px)} 44%{transform:translateX(-6px)} 60%{transform:translateX(4px)} 76%{transform:translateX(-2px)} }
  .lk-slots.shake { animation:lkShake .45s cubic-bezier(.36,.07,.19,.97); }
  .lk-err { color:var(--danger); font-size:12px; margin-top:12px; min-height:15px; font-weight:700; }
  .lk-ok { color:var(--accent); font-size:12.5px; margin-top:12px; min-height:15px; font-weight:800; }
  /* 패드 = OS 잠금화면 결(운영자 260706 첨부) — 구분선·blur 없이 스포티파이 블랙 10% 스크림만(가독 보강 · 운영자 "10%만 불투명도") */
  .lk-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:0; width:100%; max-width:270px; margin:20px auto 0; padding:4px; border:none; background:rgba(18,18,18,.1); border-radius:var(--r-l); }
  .lk-key { height:56px; display:grid; place-items:center; font-size:22px; font-weight:700; color:var(--fg); background:none; border:none; cursor:pointer;
    -webkit-tap-highlight-color:transparent; user-select:none; touch-action:manipulation; transition:color .15s, transform .07s; }
  .lk-key:active { transform:scale(.93); }
  .lk-key:focus:not(:focus-visible) { outline:none; }   /* 진입 시 프로그램 포커스의 네모 테두리 억제(운영자 260706 스샷 · 키보드 접근성 링은 유지) */
  .lk-key.hit { color:var(--pin-ac); animation:lkKeyPop .25s cubic-bezier(.22,.61,.36,1); }   /* 탭 = 라임 점등 + 통통(OS 결) */
  @keyframes lkKeyPop { 0% { transform:scale(.88); } 60% { transform:scale(1.08); } 100% { transform:scale(1); } }
  .lk-key.empty { pointer-events:none; }
  .lk-key:focus:not(:focus-visible) { outline:none; }   /* 프로그램 포커스(pin-mode 진입 이동)는 링 없음 · 키보드 탐색은 UA 링 유지 */
  .lk-key.back svg { width:25px; height:25px; stroke:var(--fg-2); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:stroke .15s; }

<script>
/* ── 유틸(독립 뷰어 스텁) ── */
const $ = s => document.querySelector(s);
// ── 폰트 선택(운영자 260707 "설정에서 영문/한글 따로 · 볼드 고정 = 패밀리만") — 기본 Pretendard · 영문 = LEMONMILK · 한글 = Paperlogy.
//    라틴 폰트를 스택 앞에 = 라틴 글리프만 그 폰트로, 한글은 다음 폰트로 자동 폴백(영문/한글 분리의 표준 기법) · 웨이트는 기존 --fw-* 그대로(브라우저가 등록 face 매칭) ──
const yFontGet = k => { try { return localStorage.getItem('yeta_font_' + k) || 'sys'; } catch { return 'sys'; } };
const yFontSet = (k, v) => { try { localStorage.setItem('yeta_font_' + k, v); } catch {} };
function yFontApply() {
  const stack = [yFontGet('latin') === 'lemonmilk' ? "'LEMONMILK'" : null, yFontGet('hangul') === 'paperlogy' ? "'Paperlogy'" : null,
    'Pretendard', '-apple-system', 'system-ui', 'sans-serif'].filter(Boolean).join(',');
  document.documentElement.style.setProperty('--app-font', stack);
}
yFontApply();
const esc = s => String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
// ── 내 프로필 + 앱 설정(로컬 전용 · 운영자 260707 "미구현 설정 다 동작하게") ──────────────
//    프로필(이름·상태·아바타·무드색) + 토글(진동·타이핑·모션·읽음·알림) = localStorage SSOT.
//    게이트웨이 미전송(무인증 공개 주입면 0 = yeta_me_place/mood 관례 계승) · 기기 로컬 전용.
const yMeGet = k => { try { return localStorage.getItem('yeta_me_' + k) || ''; } catch { return ''; } };
const yMeSet = (k, v) => { try { if (v) localStorage.setItem('yeta_me_' + k, v); else localStorage.removeItem('yeta_me_' + k); return true; } catch { return false; } };   // 성공 여부 반환(quota 초과 시 false → 호출부 분기)
const yMeName = () => yMeGet('name') || '무음동 방문자';
const yPrefOn = (k, def) => { try { const v = localStorage.getItem('yeta_pref_' + k); return v === null ? !!def : v === '1'; } catch { return !!def; } };
const yPrefSet = (k, on) => { try { localStorage.setItem('yeta_pref_' + k, on ? '1' : '0'); } catch {} };
function yMeApply() {   // 내 프로필 → 라이브 표면(우상단 프로필 버튼·내 버블 강조색) · 미로우 아바타는 yMeRow가 직접 반영
  const av = yMeGet('avatar'), prof = document.getElementById('yprof');
  if (prof) { prof.style.backgroundImage = av ? `url("${av}")` : ''; prof.classList.toggle('has-img', true); }
  document.documentElement.style.setProperty('--bubble-me', yMeGet('accent') === 'cobalt' ? 'var(--cobalt)' : 'var(--accent)');   // 내 버블 = 브랜드 2색만(라임/코발트)
}
function yPrefApply() { document.documentElement.classList.toggle('yeta-reduce', yPrefOn('reduce', false)); }   // 모션 줄이기 = html 클래스(CSS가 애니/트랜지션 무효화)
function yAvatarPick() {   // 프로필 사진 = 파일 선택 → 256 정사각 리샘플 → data URL 로컬 저장(서버 미전송 · 파일 input은 런타임 생성 = HTML 자동완성 게이트 무관)
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => {
    const f = inp.files && inp.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onerror = () => miniToast('이미지를 못 읽었어');   // 파일 읽기 실패 피드백
    rd.onload = () => {
      const img = new Image();
      img.onload = () => {
        const S = 256, cv = document.createElement('canvas'); cv.width = cv.height = S;
        const cx = cv.getContext('2d'), sc = Math.max(S / img.width, S / img.height), w = img.width * sc, hh = img.height * sc;

      let n = 0; try { n = (+localStorage.getItem('yeta_pin_fails') || 0) + 1; localStorage.setItem('yeta_pin_fails', String(n)); if (n >= YM_MAX) localStorage.setItem('yeta_pin_until', String(Date.now() + YM_OUT_MS)); } catch {}
      slotsEl.classList.add('bad', 'shake'); errEl.className = 'lk-err'; errEl.textContent = n >= YM_MAX ? `PIN 오류 ${YM_MAX}회 — 10분 후 다시` : `패턴이 맞지 않아요 (${n}/${YM_MAX})`;
      setTimeout(() => { slotsEl.classList.remove('shake'); if (!outLeft()) errEl.textContent = ''; patReset(); }, 1400);
    }
  }
  padEl.addEventListener('pointerdown', e => {
    if (unlocked || !ymain.classList.contains('pin-mode')) return;   // pin-mode 게이트 = 비가시 조작 차단(평의회8)
    if (outLeft()) { errEl.className = 'lk-err'; errEl.textContent = `PIN 오류 ${YM_MAX}회 — ${Math.ceil(outLeft() / 60000)}분 후 다시`; return; }
    e.preventDefault(); try { padEl.setPointerCapture(e.pointerId); } catch {}
    patReset(); drawing = true; const nd = patHit(patPt(e)); if (nd) patAdd(nd);
  });
  padEl.addEventListener('pointermove', e => {
    if (!drawing || unlocked) return;
    const p = patPt(e), nd = patHit(p); if (nd) patAdd(nd);
    if (path.length) { const last = path[path.length - 1]; dragEl.style.display = ''; dragEl.setAttribute('x1', last.x); dragEl.setAttribute('y1', last.y); dragEl.setAttribute('x2', p.x); dragEl.setAttribute('y2', p.y); }
  });
  const patEnd = () => { if (!drawing) return; drawing = false; dragEl.style.display = 'none';
    if (val.length > 0 && val.length < YM_LEN) { slotsEl.classList.add('shake'); setTimeout(() => { slotsEl.classList.remove('shake'); patReset(); }, 450); } };   // 미완(4점 미만) = 흔들고 리셋
  padEl.addEventListener('pointerup', patEnd); padEl.addEventListener('pointercancel', patEnd);
  // 자동 pin-mode 폐지(운영자 260706 플로우 복원): 진입 = 소년 촤르륵+라벨 스윕 → 잠금 터치가 시퀀스 시작 · 언락 기억 없음은 유지(매 리로드 = 잠금 화면부터)
  nav.onclick = e => {
    const b = e.target.closest('button'); if (!b) return;
    const tab = b.dataset.tab;
    if (!unlocked) { ymEnterPin(); slotsEl.classList.add('shake'); setTimeout(() => slotsEl.classList.remove('shake'), 450); return; }
    if (tab === 'char' || tab === 'list' || tab === 'map') { yTab(tab); return; }   // 메뉴1 캐릭터 · 메뉴2 대화 · 메뉴3 지도(운영자 260707 "앱에 다 반영")
    if (tab === 'settings') { yShowSettings(); return; }   // 설정 화면(목업 · 운영자 260706) · 옛 'chat' 탭 폐지 = 챗은 메뉴2 대화 목록으로만 진입
    miniToast('준비중 — 곧 열려');
  };
  const _yprofEl = $('#yprof'); if (_yprofEl) _yprofEl.onclick = () => yShowProfile();   // 우상단 개인 프로필 화면(목업 · 운영자 260706)
})();
/* PWA 서비스워커 등록 */
try { if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {}); } catch {}
/* 첫 열기 부팅 스플래시(운영자 260708) — 인라인 "YETABUS"(첫 페인트 즉시)를 스크램블로 교체해 resolve · 페이드는 CSS(.yboot ybootOut)가 보장 · animationend = 제거(스크램블 타이머 정지) */
(function () { var el = document.getElementById('yboot'); if (!el) return;
  var w = document.getElementById('ybootW'); if (w) { try { var sc = yScramble('YETABUS'); sc.className = w.className; w.replaceWith(sc); } catch (e) {} }
  el.addEventListener('animationend', function () { el.remove(); }, { once: true });
})();
/* ── (V1 260704) 진입점 = 메인 화면(YETA + PIN). 챗 자동오픈·재오픈 제거 — 챗은 PIN 해제 후 '대화' 탭에서만 연다.
      챗 닫기 = 메인 복귀(dialog 아래 .ymain 상주). 딥링크(?yeta=)만 예외 진입(위 L576). ── */
